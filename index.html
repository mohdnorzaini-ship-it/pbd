    window.F_initializeApp = initializeApp;
    window.F_getAuth = getAuth;
    window.F_signInAnonymously = signInAnonymously;
    window.F_onAuthStateChanged = onAuthStateChanged;
    window.F_getFirestore = getFirestore;
    window.F_doc = doc;
    window.F_setDoc = setDoc;
    window.F_getDoc = getDoc;
    window.F_collection = collection;
    window.F_addDoc = addDoc;
    window.F_updateDoc = updateDoc;
    window.F_onSnapshot = onSnapshot;

    // Isyaratkan kepada React bahawa Firebase API sedia digunakan
    window.dispatchEvent(new Event('firebase-bridge-ready'));

    const SortIcon = ({ active, direction }) => {

    function App() {
      // Autentikasi & Skrin States
      const [isLoggedIn, setIsLoggedIn] = React.useState(false);
      const [authScreen, setAuthScreen] = React.useState('login'); // 'login' | 'register'
      const [loginEmail, setLoginEmail] = React.useState('');
      const [loginPassword, setLoginPassword] = React.useState('');
      const [regPassword, setRegPassword] = React.useState('');
      const [regName, setRegName] = React.useState('');
      const [regState, setRegState] = React.useState('JPN PERAK');
      const [regCode, setRegCode] = React.useState('CM36');

      // State Menu Mudah Alih (Responsive Drawer Toggle)
      const [mobileMenuOpen, setMobileMenuOpen] = React.useState(false);

      // Forgot Password Modal States
      const [resetEmail, setResetEmail] = React.useState('');
      const [resetName, setResetName] = React.useState('');
      const [resetCode, setResetCode] = React.useState('CM36');
      const [resetNewPassword, setResetNewPassword] = React.useState('');

      // Firebase Config Override States
      const [configSource, setConfigSource] = React.useState('auto'); // 'auto' | 'manual'
      const [cfgApiKey, setCfgApiKey] = React.useState('');
      const [cfgAuthDomain, setCfgAuthDomain] = React.useState('');
      const [cfgProjectId, setCfgProjectId] = React.useState('');
      const [cfgStorageBucket, setCfgStorageBucket] = React.useState('');
      const [cfgMessagingSenderId, setCfgMessagingSenderId] = React.useState('');
      const [cfgAppId, setCfgAppId] = React.useState('');

      // Global Modals and Toasts
      const [toast, setToast] = React.useState({ show: false, title: '', desc: '', type: 'error' });
      const [showResetModal, setShowResetModal] = React.useState(false);
      const [showConfigModal, setShowConfigModal] = React.useState(false);

      // Data Pengguna DELIMa
      const [activeDelimaUser, setActiveDelimaUser] = React.useState(null);
      const [delimaUsersList, setDelimaUsersList] = React.useState([]);
      const [delimaLogsList, setDelimaLogsList] = React.useState([]);
      const [isRealtimeSupported, setIsRealtimeSupported] = React.useState(true);
      const [firebaseReady, setFirebaseReady] = React.useState(false);

      // Modul Utama Portal: 'uasa' | 'pbd_keseluruhan' | 'pbd_kemahiran' | 'profil'
      const [activeModule, setActiveModule] = React.useState('uasa');
      // Sub-tab: 'ringkasan' | 'subjek'
      const [activeTab, setActiveTab] = React.useState('ringkasan');
      
      const [isLoading, setIsLoading] = React.useState(true);
      const [error, setError] = React.useState(null);
      const [isManualLoaded, setIsManualLoaded] = React.useState({
        uasa: false,
        pbd_keseluruhan: false,
        pbd_kemahiran: false
      });

      // Simpan data mentah mengikut modul
      const [rawRows, setRawRows] = React.useState({
        uasa: [],
        pbd_keseluruhan: [],
        pbd_kemahiran: []
      });

      // Keadaan Penapis Utama
      const [activeFilters, setActiveFilters] = React.useState({
        ppd: 'ALL',
        school: 'ALL',
        schoolCode: 'ALL',
        schoolType: 'ALL',
        level: 'ALL',
        subject: 'ALL',
        skill: 'ALL',
        location: 'ALL',
        dlp: 'ALL'
      });

      // PBD Kemahiran Schema Meta
      const [hasSkillSchema, setHasSkillSchema] = React.useState(false);

      // Keadaan Carian, Isihan & Halaman Jadual
      const [tableSearchTerm, setTableSearchTerm] = React.useState('');
      const [sortConfig, setSortConfig] = React.useState({ key: 'school', direction: 'asc' });
      const [currentPage, setCurrentPage] = React.useState(1);
      const itemsPerPage = 15;

      // Interaksi Klik Graf
      const [clickedBar, setClickedBar] = React.useState(null);
      const [clickedGroupedBar, setClickedGroupedBar] = React.useState(null);

      // Analisis Mata Pelajaran & Kemahiran Terpilih
      const [selectedAnalysisSubject, setSelectedAnalysisSubject] = React.useState('');
      const [activeSubjectMetric, setActiveSubjectMetric] = React.useState('baikRate'); // 'baikRate' | 'passRate' | 'critRate' | 'excelRate'

      // URL Sumber Data (GitHub Raw)
      const DATA_URLS = {
        uasa: "https://raw.githubusercontent.com/mohdnorzaini-ship-it/pbd/main/UASA_KESELURUHAN_2025.csv.xlsx",
        pbd_kemahiran: "https://raw.githubusercontent.com/mohdnorzaini-ship-it/pbd/main/kEMAHIRAN_KESELURUHAN_2025.csv",
        pbd_keseluruhan: "https://raw.githubusercontent.com/mohdnorzaini-ship-it/pbd/refs/heads/main/PBD_KESELURUHAN_2025.csv"
      };

      // Senarai Mock Pentadbir Sekolah Perak yang Realistik untuk Sandaran Pintar (Fallback)
      const mockPerakAdmins = React.useMemo(() => [
        { id: "g_44281190_moe_dl_edu_my", name: "ROSLAN BIN ABDUL HAMID", state: "DAERAH KINTA UTARA", code: "CM12", email: "g-44281190@moe-dl.edu.my", visitCount: 12 },
        { id: "g_10398271_moe_dl_edu_my", name: "SITI AMINAH BINTI YUSOF", state: "DAERAH LARUT, MATANG DAN SELAMA", code: "CM08", email: "g-10398271@moe-dl.edu.my", visitCount: 9 },
        { id: "g_55201928_moe_dl_edu_my", name: "NURUL HIDAYAH BINTI AHMAD", state: "DAERAH KINTA SELATAN", code: "CM45", email: "g-55201928@moe-dl.edu.my", visitCount: 8 },
        { id: "g_88229910_moe_dl_edu_my", name: "CHIN KONG MENG", state: "DAERAH MANJUNG", code: "CM21", email: "g-88229910@moe-dl.edu.my", visitCount: 6 },
        { id: "g_77112233_moe_dl_edu_my", name: "SUBRAMANIAM A/L GANESAN", state: "DAERAH HILIR PERAK", code: "CM19", email: "g-77112233@moe-dl.edu.my", visitCount: 4 }
      ], []);

      // Fungsi Pembantu Toast Alert
      const showToast = (title, desc, type = 'error') => {
        setToast({ show: true, title, desc, type });
        setTimeout(() => {
          setToast(prev => ({ ...prev, show: false }));
        }, 5000);
      };

      const initFirebase = React.useCallback(async () => {
        if (!window.F_initializeApp) return;

        let activeConfig;
        const savedCustomConfig = localStorage.getItem('custom_firebase_config');
        
        if (savedCustomConfig) {
          try {
            activeConfig = JSON.parse(savedCustomConfig);
            setConfigSource('manual');
            setCfgApiKey(activeConfig.apiKey || '');
            setCfgAuthDomain(activeConfig.authDomain || '');
            setCfgProjectId(activeConfig.projectId || '');
            setCfgStorageBucket(activeConfig.storageBucket || '');
            setCfgMessagingSenderId(activeConfig.messagingSenderId || '');
            setCfgAppId(activeConfig.appId || '');
          } catch (e) {
            console.warn("Ralat memproses Firebase manual.");
          }
        }

        if (!activeConfig) {
          activeConfig = {
            apiKey: "AIzaSyBUdjM6ezrsoNcJ5WEMEUqNJIjoUu_yQYk",
            authDomain: "dashboard-pbd-64e15.firebaseapp.com",
            projectId: "dashboard-pbd-64e15",
            storageBucket: "dashboard-pbd-64e15.firebasestorage.app",
            messagingSenderId: "352363531733",
            appId: "1:352363531733:web:8e45e274f6d882458b015c",
            measurementId: "G-RKKGHTFGB6"
          };
          setConfigSource('auto');
        }

        try {
          const app = window.F_initializeApp(activeConfig);
          const auth = window.F_getAuth(app);
          const db = window.F_getFirestore(app);
          
          window.firebaseApp = app;
          window.firebaseAuth = auth;
          window.firebaseDb = db;
          
          setFirebaseReady(true);
          
          await window.F_signInAnonymously(auth);

          window.F_onAuthStateChanged(auth, (user) => {
            if (user) {
              const savedSession = localStorage.getItem('pbd_session_email');
              if (savedSession) {
                fetchAndLoadUserProfile(savedSession, null, false);
              }
              setupRealtimeListeners();
            }
          });
        } catch (err) {
          console.error("Firebase Gagal:", err);
          const savedSession = localStorage.getItem('pbd_session_email');
          if (savedSession) {
            executeLocalFallbackLogin(savedSession, null, false);
          }
        }
      }, []);

      React.useEffect(() => {
        const handleReady = () => initFirebase();
        window.addEventListener('firebase-bridge-ready', handleReady);
        if (window.F_initializeApp) {
          initFirebase();
        }
        return () => window.removeEventListener('firebase-bridge-ready', handleReady);
      }, [initFirebase]);

      const setupRealtimeListeners = () => {
        if (!window.firebaseDb) return;
        
        const appIdVal = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
        const usersCol = window.F_collection(window.firebaseDb, 'artifacts', appIdVal, 'public', 'data', 'delima_users');
        const logsCol = window.F_collection(window.firebaseDb, 'artifacts', appIdVal, 'public', 'data', 'delima_logs');

        window.F_onSnapshot(usersCol, (snapshot) => {
          const list = [];
          snapshot.forEach((doc) => {
            list.push({ id: doc.id, ...doc.data() });
          });
          list.sort((a, b) => (b.visitCount || 0) - (a.visitCount || 0));
          setDelimaUsersList(list);
          setIsRealtimeSupported(true);
        }, (error) => {
          setIsRealtimeSupported(false);
          triggerFallbackStats();
        });

        window.F_onSnapshot(logsCol, (snapshot) => {
          const list = [];
          snapshot.forEach((doc) => {
            list.push({ id: doc.id, ...doc.data() });
          });
          list.sort((a, b) => {
            const timeA = a.timestamp?.seconds || 0;
            const timeB = b.timestamp?.seconds || 0;
            return timeB - timeA;
          });
          setDelimaLogsList(list);
        }, (error) => {
          setIsRealtimeSupported(false);
          triggerFallbackLogs();
        });
      };

      const triggerFallbackStats = React.useCallback(() => {
        let combined = [...mockPerakAdmins];
        const localUsers = JSON.parse(localStorage.getItem('pbd_local_users') || '{}');
        
        Object.keys(localUsers).forEach(id => {
          const u = localUsers[id];
          combined = combined.filter(admin => admin.email !== u.email);
          combined.push({
            id: id,
            name: u.name,
            state: u.state,
            code: u.code,
            email: u.email,
            visitCount: u.visitCount || 1
          });
        });

        if (activeDelimaUser) {
          const uId = activeDelimaUser.email.replace(/[@.]/g, "_");
          combined = combined.filter(u => u.id !== uId);
          combined.push({
            id: uId,
            name: activeDelimaUser.name,
            state: activeDelimaUser.state,
            code: activeDelimaUser.code,
            email: activeDelimaUser.email,
            visitCount: activeDelimaUser.visitCount || 1
          });
        }

        combined.sort((a, b) => b.visitCount - a.visitCount);
        setDelimaUsersList(combined);
      }, [activeDelimaUser, mockPerakAdmins]);

      const triggerFallbackLogs = React.useCallback(() => {
        const localLogs = JSON.parse(localStorage.getItem('pbd_local_logs') || '[]');
        const minutesDiff = [2, 14, 28, 45, 120];
        let combined = [];

        localLogs.forEach(log => {
          combined.push({
            name: log.name,
            email: log.email,
            timestamp: { toDate: () => new Date(log.timestamp.seconds * 1000) }
          });
        });

        mockPerakAdmins.forEach((admin, i) => {
          const logTime = new Date();
          logTime.setMinutes(logTime.getMinutes() - minutesDiff[i]);
          combined.push({
            name: admin.name,
            email: admin.email,
            timestamp: { toDate: () => logTime }
          });
        });

        combined.sort((a, b) => b.timestamp.toDate() - a.timestamp.toDate());
        setDelimaLogsList(combined);
      }, [mockPerakAdmins]);

      const executeLocalFallbackLogin = (email, password, isExplicit) => {
        const docId = email.replace(/[@.]/g, "_");
        const localUsers = JSON.parse(localStorage.getItem('pbd_local_users') || '{}');

        if (localUsers[docId]) {
          const data = localUsers[docId];
          if (isExplicit && password && data.password !== password) {
            showToast("Akses Ditolak", "Kata laluan salah! Sila cuba lagi.");
            return;
          }

          let newVisits = data.visitCount || 1;
          const sessionKey = `pbd_session_active_${docId}`;

          if (isExplicit || !sessionStorage.getItem(sessionKey)) {
            newVisits = (data.visitCount || 0) + 1;
            data.visitCount = newVisits;

      const detectAndProcessData = (jsonData, moduleType) => {
        if (jsonData.length === 0) return;
        const headers = Object.keys(jsonData[0] || {});

        const getHeaderKey = (possibleNames) => {
          return headers.find(h => possibleNames.includes(h.toUpperCase())) || possibleNames[0];
        };

        const filterKeys = {
          ppd: getHeaderKey(['KET_PPD', 'PPD', 'PEJABAT PENDIDIKAN DAERAH', 'NAMA_PPD', 'NAMA PPD', 'KETPPD']),
          school: getHeaderKey(['NAMA_PENUH_INSTITUSI', 'NAMA_INSTITUSI', 'SEKOLAH', 'NAMA SEKOLAH', 'INSTITUSI', 'NAMAPENUHHINSTITUSI']),
          schoolCode: getHeaderKey(['KOD_INSTITUSI', 'KOD_SEKOLAH', 'KOD SEKOLAH', 'KOD_INST', 'KODINSTITUSI']),
          schoolType: getHeaderKey(['JNS_INSTITUSI', 'JENIS_INSTITUSI', 'JENIS SEKOLAH', 'JNS_SEKOLAH', 'JNSINSTITUSI']),
          level: getHeaderKey(['THN_TING', 'TINGKATAN', 'TAHUN', 'TAHUN_TINGKATAN', 'THNTING', 'LEVEL']),
          subject: getHeaderKey(['MP', 'MATA_PELAJARAN', 'MATAPELAJARAN', 'MATA PELAJARAN', 'SUBJECT']),
          location: getHeaderKey(['KET_LOKASI', 'LOKASI', 'KAWASAN', 'KETLOKASI']),
          dlp: getHeaderKey(['KET_DLP', 'DLP', 'STATUS_DLP', 'STATUS_DLP_SEKOLAH', 'KETDLP']),
          skill: getHeaderKey(['KEMAHIRAN', 'ASPEK', 'BIDANG', 'SKILL', 'PENERANGAN'])
        };

        const cleanedRows = [];

        if (moduleType === 'uasa') {
          const gradeKeys = {
            a: getHeaderKey(['A', 'BIL_A', 'BIL A', 'TP1', 'TP_1']),
            b: getHeaderKey(['B', 'BIL_B', 'BIL B', 'TP2', 'TP_2']),
            c: getHeaderKey(['C', 'BIL_C', 'BIL C', 'TP3', 'TP_3']),
            d: getHeaderKey(['D', 'BIL_D', 'BIL D', 'TP4', 'TP_4']),
            e: getHeaderKey(['E', 'BIL_E', 'BIL E', 'TP5', 'TP_5']),
            f: getHeaderKey(['F', 'BIL_F', 'BIL F', 'TP6', 'TP_6']),
            th: getHeaderKey(['TH', 'BIL_TH', 'BIL TH', 'TD', 'BIL_TD', 'SUM_OF_TD', 'TIDAK HADIR', 'TIDAK_HADIR'])
          };

          jsonData.forEach(row => {
            if (!row[filterKeys.schoolCode] && !row[filterKeys.school]) return;

            const valA = parseInt(row[gradeKeys.a]?.toString().replace(/\D/g, '')) || 0;
            const valB = parseInt(row[gradeKeys.b]?.toString().replace(/\D/g, '')) || 0;
            const valC = parseInt(row[gradeKeys.c]?.toString().replace(/\D/g, '')) || 0;
            const valD = parseInt(row[gradeKeys.d]?.toString().replace(/\D/g, '')) || 0;
            const valE = parseInt(row[gradeKeys.e]?.toString().replace(/\D/g, '')) || 0;
            const valF = parseInt(row[gradeKeys.f]?.toString().replace(/\D/g, '')) || 0;
            const valTH = parseInt(row[gradeKeys.th]?.toString().replace(/\D/g, '')) || 0;

            const totalRowStudents = valA + valB + valC + valD + valE + valF + valTH;
            const totalAssessed = valA + valB + valC + valD + valE + valF;

            cleanedRows.push({
              categories: {
                ppd: row[filterKeys.ppd]?.toString().trim() || 'N/A',
                school: row[filterKeys.school]?.toString().trim() || 'N/A',
                schoolCode: row[filterKeys.schoolCode]?.toString().trim() || 'N/A',
                schoolType: row[filterKeys.schoolType]?.toString().trim() || 'N/A',
                level: row[filterKeys.level]?.toString().trim() || 'N/A',
                subject: row[filterKeys.subject]?.toString().trim() || 'N/A',
                location: row[filterKeys.location]?.toString().trim() || 'N/A',
                dlp: row[filterKeys.dlp]?.toString().trim() || 'N/A',
              },
              counts: { a: valA, b: valB, c: valC, d: valD, e: valE, f: valF, th: valTH, totalRowStudents, totalAssessed }
            });
          });
        } else {
          const tpColsMap = {
            tp1: getHeaderKey(['TP1', 'TP_1', 'BIL_TP1', 'BILTP1']),
            tp2: getHeaderKey(['TP2', 'TP_2', 'BIL_TP2', 'BILTP2']),
            tp3: getHeaderKey(['TP3', 'TP_3', 'BIL_TP3', 'BILTP3']),
            tp4: getHeaderKey(['TP4', 'TP_4', 'BIL_TP4', 'BILTP4']),
            tp5: getHeaderKey(['TP5', 'TP_5', 'BIL_TP5', 'BILTP5']),
            tp6: getHeaderKey(['TP6', 'TP_6', 'BIL_TP6', 'BILTP6']),
            td: getHeaderKey(['TD', 'BIL_TD', 'BILTD', 'SUM_OF_TD', 'SUM_OF_TD_AL', 'TIDAKDITAKSIR', 'TIDAK_DITAKSIR'])
          };

          const isSkillMode = moduleType === 'pbd_kemahiran';
          setHasSkillSchema(isSkillMode && !!filterKeys.skill);

          jsonData.forEach(row => {
            if (!row[filterKeys.schoolCode] && !row[filterKeys.school]) return;

            const tp1 = parseInt(row[tpColsMap.tp1]?.toString().replace(/\D/g, '')) || 0;
            const tp2 = parseInt(row[tpColsMap.tp2]?.toString().replace(/\D/g, '')) || 0;
            const tp3 = parseInt(row[tpColsMap.tp3]?.toString().replace(/\D/g, '')) || 0;
            const tp4 = parseInt(row[tpColsMap.tp4]?.toString().replace(/\D/g, '')) || 0;
            const tp5 = parseInt(row[tpColsMap.tp5]?.toString().replace(/\D/g, '')) || 0;
            const tp6 = parseInt(row[tpColsMap.tp6]?.toString().replace(/\D/g, '')) || 0;
            const td = parseInt(row[tpColsMap.td]?.toString().replace(/\D/g, '')) || 0;

            const totalRowStudents = tp1 + tp2 + tp3 + tp4 + tp5 + tp6 + td;
            const totalAssessed = tp1 + tp2 + tp3 + tp4 + tp5 + tp6;

            cleanedRows.push({
              categories: {
                ppd: row[filterKeys.ppd]?.toString().trim() || 'N/A',
                school: row[filterKeys.school]?.toString().trim() || 'N/A',
                schoolCode: row[filterKeys.schoolCode]?.toString().trim() || 'N/A',
                schoolType: row[filterKeys.schoolType]?.toString().trim() || 'N/A',
                level: row[filterKeys.level]?.toString().trim() || 'N/A',
                subject: row[filterKeys.subject]?.toString().trim() || 'N/A',
                location: row[filterKeys.location]?.toString().trim() || 'N/A',
                dlp: row[filterKeys.dlp]?.toString().trim() || 'N/A',
                ...(isSkillMode ? { skill: row[filterKeys.skill]?.toString().trim() || 'N/A' } : {})
              },
              counts: { tp1, tp2, tp3, tp4, tp5, tp6, td, totalRowStudents, totalAssessed }
            });
          });
        }

        setRawRows(prev => ({ ...prev, [moduleType]: cleanedRows }));

        const uniqueSubjects = Array.from(new Set(cleanedRows.map(r => r.categories.subject))).sort();
        if (uniqueSubjects.length > 0) {
          setSelectedAnalysisSubject(uniqueSubjects[0]);
        }

        if (moduleType === 'uasa') {
          setActiveSubjectMetric('baikRate');
        } else {
          setActiveSubjectMetric('passRate');
        }
      };

      const fetchModuleData = React.useCallback((moduleType) => {
        if (moduleType === 'profil') return;
        setIsLoading(true);
        setError(null);
        const url = DATA_URLS[moduleType];

        if (rawRows[moduleType] && rawRows[moduleType].length > 0) {
          setIsLoading(false);
          return;
        }

        fetch(url)
          .then(res => {
            if (!res.ok) throw new Error(`Status ${res.status}`);
            return url.endsWith('.xlsx') ? res.arrayBuffer() : res.text();
          })
          .then(data => {
            if (url.endsWith('.xlsx')) {
              const workbook = XLSX.read(new Uint8Array(data), { type: 'array' });
              const sheet = workbook.Sheets[workbook.SheetNames[0]];
              const jsonData = XLSX.utils.sheet_to_json(sheet, { defval: "" });
              detectAndProcessData(jsonData, moduleType);
            } else {
              Papa.parse(data, {
                header: true,
                skipEmptyLines: true,
                complete: (results) => {
                  detectAndProcessData(results.data, moduleType);
                },
                error: (err) => {
                  throw new Error(err.message);
                }
              });
            }
            setIsLoading(false);
          })
          .catch(err => {
            setError(`Sila muat naik fail manual bagi modul ${moduleType.toUpperCase()}: ${err.message}`);
            setIsLoading(false);
          });
      }, [rawRows, DATA_URLS]);

      React.useEffect(() => {
        if (isLoggedIn && activeModule !== 'profil' && !isManualLoaded[activeModule]) {
          fetchModuleData(activeModule);
        }
      }, [activeModule, isLoggedIn, fetchModuleData, isManualLoaded]);

      const handleManualUpload = (e) => {
        const file = e.target.files[0];
        if (!file) return;

        setIsLoading(true);
        setError(null);

        const reader = new FileReader();
        const extension = file.name.split('.').pop().toLowerCase();

        if (extension === 'xlsx' || extension === 'xls') {
          reader.onload = (evt) => {
            try {
              const data = new Uint8Array(evt.target.result);
              const workbook = XLSX.read(data, { type: 'array' });
              const sheet = workbook.Sheets[workbook.SheetNames[0]];
              const jsonData = XLSX.utils.sheet_to_json(sheet, { defval: "" });
              
              detectAndProcessData(jsonData, activeModule);
              setIsManualLoaded(prev => ({ ...prev, [activeModule]: true }));
              setIsLoading(false);
            } catch (err) {
              setError("Gagal memproses fail Excel manual: " + err.message);
              setIsLoading(false);
            }
          };
          reader.readAsArrayBuffer(file);
        } else {
          Papa.parse(file, {
            header: true,
            skipEmptyLines: true,
            complete: (results) => {
              detectAndProcessData(results.data, activeModule);
              setIsManualLoaded(prev => ({ ...prev, [activeModule]: true }));
              setIsLoading(false);
            },
            error: (err) => {
              setError("Gagal memproses fail CSV manual: " + err.message);
              setIsLoading(false);
            }
          });
        }
      };

      const currentRawRows = rawRows[activeModule] || [];

      const dynamicOptions = React.useMemo(() => {
        const keys = ['ppd', 'school', 'schoolCode', 'schoolType', 'level', 'subject', 'location', 'dlp', 'skill'];
        const options = {};

        keys.forEach(key => {
          const matchingRows = currentRawRows.filter(row => {
            for (const otherKey of keys) {
              if (otherKey === key) continue;
              const activeVal = activeFilters[otherKey];
              if (activeVal && activeVal !== 'ALL') {
                if (row.categories[otherKey] !== activeVal) return false;
              }
            }
            return true;
          });

          const uniqueVals = new Set();
          matchingRows.forEach(row => {
            const val = row.categories[key];
            if (val && val !== 'N/A') uniqueVals.add(val);
          });

          options[key] = Array.from(uniqueVals).sort();
        });

        return options;
      }, [currentRawRows, activeFilters]);

      React.useEffect(() => {
        if (currentRawRows.length === 0) return;
        let changed = false;
        const updated = { ...activeFilters };

        Object.keys(activeFilters).forEach(key => {
          const currentVal = activeFilters[key];
          if (currentVal && currentVal !== 'ALL') {
            const valid = dynamicOptions[key] || [];
            if (!valid.includes(currentVal)) {
              updated[key] = 'ALL';
              changed = true;
            }
          }
        });

        if (changed) {
          setActiveFilters(updated);
        }
      }, [activeFilters, dynamicOptions, currentRawRows]);

      const filteredRows = React.useMemo(() => {
        return currentRawRows.filter(row => {
          const keys = Object.keys(activeFilters);
          for (const key of keys) {
            const selectedVal = activeFilters[key];
            if (selectedVal && selectedVal !== 'ALL') {
              if (row.categories[key] !== selectedVal) return false;
            }
          }
          return true;
        });
      }, [currentRawRows, activeFilters]);

      const filteredMetrics = React.useMemo(() => {
        if (filteredRows.length === 0) {
          return {
            total: 0, tp1: 0, tp2: 0, tp3: 0, tp4: 0, tp5: 0, tp6: 0, td: 0,
            a: 0, b: 0, c: 0, d: 0, e: 0, f: 0, th: 0,
            passRate: "0.0", excelRate: "0.0", critRate: "0.0", assessedRate: "0.0", assessedCount: 0,
            baikRate: "0.0", nearMissRate: "0.0", intervensiRate: "0.0",
            majorityLabel: "N/A", majorityPercent: "0.0"
          };
        }

        let totalStudents = 0;
        let totalAssessed = 0;

        if (activeModule === 'uasa') {
          let a = 0, b = 0, c = 0, d = 0, e = 0, f = 0, th = 0;
          filteredRows.forEach(row => {
            a += row.counts.a;
            b += row.counts.b;
            c += row.counts.c;
            d += row.counts.d;
            e += row.counts.e;
            f += row.counts.f;
            th += row.counts.th;
            totalStudents += row.counts.totalRowStudents;
            totalAssessed += row.counts.totalAssessed;
          });

          const sumAll = totalStudents || 1;
          const pA = ((a / sumAll) * 100).toFixed(1);
          const pB = ((b / sumAll) * 100).toFixed(1);
          const pC = ((c / sumAll) * 100).toFixed(1);
          const pD = ((d / sumAll) * 100).toFixed(1);
          const pE = ((e / sumAll) * 100).toFixed(1);
          const pF = ((f / sumAll) * 100).toFixed(1);
          const pTH = ((th / sumAll) * 100).toFixed(1);

          const assessedRate = sumAll > 0 ? ((totalAssessed / sumAll) * 100).toFixed(1) : "0.0";
          const baikRate = sumAll > 0 ? (((a + b + c) / sumAll) * 100).toFixed(1) : "0.0";
          const nearMissRate = sumAll > 0 ? (((d + e) / sumAll) * 100).toFixed(1) : "0.0";
          const intervensiRate = sumAll > 0 ? ((f / sumAll) * 100).toFixed(1) : "0.0";

          const arr = [parseFloat(pA), parseFloat(pB), parseFloat(pC), parseFloat(pD), parseFloat(pE), parseFloat(pF), parseFloat(pTH)];
          const maxVal = Math.max(...arr);
          const labels = ['Gred A', 'Gred B', 'Gred C', 'Gred D', 'Gred E', 'Gred F', 'Tidak Hadir (TH)'];
          const majorityLabel = labels[arr.indexOf(maxVal)];

          return {
            total: totalStudents, a, b, c, d, e, f, th,
            pA, pB, pC, pD, pE, pF, pTH,
            baikRate, nearMissRate, intervensiRate, assessedRate, assessedCount: totalAssessed,
            majorityLabel, majorityPercent: maxVal.toFixed(1)
          };
        } else {
          let tp1 = 0, tp2 = 0, tp3 = 0, tp4 = 0, tp5 = 0, tp6 = 0, td = 0;
          filteredRows.forEach(row => {
            tp1 += row.counts.tp1;
            tp2 += row.counts.tp2;
            tp3 += row.counts.tp3;
            tp4 += row.counts.tp4;
            tp5 += row.counts.tp5;
            tp6 += row.counts.tp6;
            td += row.counts.td;
            totalStudents += row.counts.totalRowStudents;
            totalAssessed += row.counts.totalAssessed;
          });

          const sumAll = totalStudents || 1;
          const p1 = ((tp1 / sumAll) * 100).toFixed(1);
          const p2 = ((tp2 / sumAll) * 100).toFixed(1);
          const p3 = ((tp3 / sumAll) * 100).toFixed(1);
          const p4 = ((tp4 / sumAll) * 100).toFixed(1);
          const p5 = ((tp5 / sumAll) * 100).toFixed(1);
          const p6 = ((tp6 / sumAll) * 100).toFixed(1);
          const ptd = ((td / sumAll) * 100).toFixed(1);

          const assessedRate = sumAll > 0 ? ((totalAssessed / sumAll) * 100).toFixed(1) : "0.0";
          const passRate = sumAll > 0 ? (((tp3 + tp4 + tp5 + tp6) / sumAll) * 100).toFixed(1) : "0.0";
          const critRate = sumAll > 0 ? (((tp1 + tp2) / sumAll) * 100).toFixed(1) : "0.0";
          const excelRate = sumAll > 0 ? (((tp5 + tp6) / sumAll) * 100).toFixed(1) : "0.0";

          const arr = [parseFloat(p1), parseFloat(p2), parseFloat(p3), parseFloat(p4), parseFloat(p5), parseFloat(p6), parseFloat(ptd)];
          const maxVal = Math.max(...arr);
          const labels = ['TP 1', 'TP 2', 'TP 3', 'TP 4', 'TP 5', 'TP 6', 'Tidak Ditaksir (TD)'];
          const majorityLabel = labels[arr.indexOf(maxVal)];

          return {
            total: totalStudents, tp1, tp2, tp3, tp4, tp5, tp6, td,
            p1, p2, p3, p4, p5, p6, ptd,
            passRate, excelRate, critRate, assessedRate, assessedCount: totalAssessed,
            majorityLabel, majorityPercent: maxVal.toFixed(1)
          };
        }
      }, [filteredRows, activeModule]);

      const chartBars = React.useMemo(() => {
        if (activeModule === 'uasa') {
          return [
            { label: 'Gred A', percent: filteredMetrics.pA, count: filteredMetrics.a, color: 'bg-emerald-400 hover:bg-emerald-500', textColor: 'text-emerald-600' },
            { label: 'Gred B', percent: filteredMetrics.pB, count: filteredMetrics.b, color: 'bg-emerald-300 hover:bg-emerald-400', textColor: 'text-emerald-500' },
            { label: 'Gred C', percent: filteredMetrics.pC, count: filteredMetrics.c, color: 'bg-emerald-200 hover:bg-emerald-300', textColor: 'text-emerald-400' },
            { label: 'Gred D', percent: filteredMetrics.pD, count: filteredMetrics.d, color: 'bg-amber-300 hover:bg-amber-400', textColor: 'text-amber-500' },
            { label: 'Gred E', percent: filteredMetrics.pE, count: filteredMetrics.e, color: 'bg-amber-200 hover:bg-amber-300', textColor: 'text-amber-400' },
            { label: 'Gred F', percent: filteredMetrics.pF, count: filteredMetrics.f, color: 'bg-rose-400 hover:bg-rose-500', textColor: 'text-rose-600' },
            { label: 'TH', percent: filteredMetrics.pTH, count: filteredMetrics.th, color: 'bg-slate-300 hover:bg-slate-400', textColor: 'text-slate-500' },
          ];
        } else {
          return [
            { label: 'TP 1', percent: filteredMetrics.p1, count: filteredMetrics.tp1, color: 'bg-rose-200 hover:bg-rose-300', textColor: 'text-rose-500' },
            { label: 'TP 2', percent: filteredMetrics.p2, count: filteredMetrics.tp2, color: 'bg-amber-200 hover:bg-amber-300', textColor: 'text-amber-500' },
            { label: 'TP 3', percent: filteredMetrics.p3, count: filteredMetrics.tp3, color: 'bg-emerald-300 hover:bg-emerald-400', textColor: 'text-emerald-500' },
            { label: 'TP 4', percent: filteredMetrics.p4, count: filteredMetrics.tp4, color: 'bg-blue-400 hover:bg-blue-500', textColor: 'text-blue-500' },
            { label: 'TP 5', percent: filteredMetrics.p5, count: filteredMetrics.tp5, color: 'bg-purple-400 hover:bg-purple-500', textColor: 'text-purple-500' },
            { label: 'TP 6', percent: filteredMetrics.p6, count: filteredMetrics.tp6, color: 'bg-amber-400 hover:bg-amber-500', textColor: 'text-amber-600' },
            { label: 'TD', percent: filteredMetrics.ptd, count: filteredMetrics.td, color: 'bg-slate-300 hover:bg-slate-400', textColor: 'text-slate-500' },
          ];
        }
      }, [filteredMetrics, activeModule]);

      const chartGroupedBars = React.useMemo(() => {
        const total = filteredMetrics.total || 1;
        if (activeModule === 'uasa') {
          const baikCount = filteredMetrics.a + filteredMetrics.b + filteredMetrics.c;
          const nearMissCount = filteredMetrics.d + filteredMetrics.e;
          const intervensiCount = filteredMetrics.f;
          const thCount = filteredMetrics.th;

          return [
            { label: 'Kelompok Baik (A, B, C)', percent: ((baikCount / total) * 100).toFixed(1), count: baikCount, color: 'bg-emerald-400 hover:bg-emerald-500', textColor: 'text-emerald-600' },
            { label: 'Kelompok Near Miss (D, E)', percent: ((nearMissCount / total) * 100).toFixed(1), count: nearMissCount, color: 'bg-amber-400 hover:bg-amber-500', textColor: 'text-amber-500' },
            { label: 'Kelompok Intervensi (F)', percent: ((intervensiCount / total) * 100).toFixed(1), count: intervensiCount, color: 'bg-rose-400 hover:bg-rose-500', textColor: 'text-rose-500' },
            { label: 'Tidak Hadir (TH)', percent: ((thCount / total) * 100).toFixed(1), count: thCount, color: 'bg-slate-300 hover:bg-slate-400', textColor: 'text-slate-500' }
          ];
        } else {
          const tdCount = filteredMetrics.td;
          const g12Count = filteredMetrics.tp1 + filteredMetrics.tp2;
          const g34Count = filteredMetrics.tp3 + filteredMetrics.tp4;
          const g56Count = filteredMetrics.tp5 + filteredMetrics.tp6;

          return [
            { label: 'TD', percent: ((tdCount / total) * 100).toFixed(1), count: tdCount, color: 'bg-slate-300 hover:bg-slate-400', textColor: 'text-slate-500' },
            { label: 'TP 1 & TP 2', percent: ((g12Count / total) * 100).toFixed(1), count: g12Count, color: 'bg-rose-300 hover:bg-rose-400', textColor: 'text-rose-500' },
            { label: 'TP 3 & TP 4', percent: ((g34Count / total) * 100).toFixed(1), count: g34Count, color: 'bg-emerald-300 hover:bg-emerald-400', textColor: 'text-emerald-500' },
            { label: 'TP 5 & TP 6', percent: ((g56Count / total) * 100).toFixed(1), count: g56Count, color: 'bg-purple-400 hover:bg-purple-500', textColor: 'text-purple-500' }
          ];
        }
      }, [filteredMetrics, activeModule]);

      const rowsFilteredExceptSubject = React.useMemo(() => {
        return currentRawRows.filter(row => {
          const keys = ['ppd', 'school', 'schoolCode', 'schoolType', 'level', 'skill', 'location', 'dlp'];
          for (const key of keys) {
            const val = activeFilters[key];
            if (val && val !== 'ALL') {
              if (row.categories[key] !== val) return false;
            }
          }
          return true;
        });
      }, [currentRawRows, activeFilters]);

      const subjectAnalysisList = React.useMemo(() => {
        const subjectMap = {};

        rowsFilteredExceptSubject.forEach(row => {
          const sub = row.categories.subject;
          if (!sub || sub === 'N/A') return;

          if (!subjectMap[sub]) {
            subjectMap[sub] = {
              subjectName: sub,
              tp1: 0, tp2: 0, tp3: 0, tp4: 0, tp5: 0, tp6: 0, td: 0,
              a: 0, b: 0, c: 0, d: 0, e: 0, f: 0, th: 0,
              total: 0, assessed: 0
            };
          }

          if (activeModule === 'uasa') {
            subjectMap[sub].a += row.counts.a;
            subjectMap[sub].b += row.counts.b;
            subjectMap[sub].c += row.counts.c;
            subjectMap[sub].d += row.counts.d;
            subjectMap[sub].e += row.counts.e;
            subjectMap[sub].f += row.counts.f;
            subjectMap[sub].th += row.counts.th;
          } else {
            subjectMap[sub].tp1 += row.counts.tp1;
            subjectMap[sub].tp2 += row.counts.tp2;
            subjectMap[sub].tp3 += row.counts.tp3;
            subjectMap[sub].tp4 += row.counts.tp4;
            subjectMap[sub].tp5 += row.counts.tp5;
            subjectMap[sub].tp6 += row.counts.tp6;
            subjectMap[sub].td += row.counts.td;
          }

          subjectMap[sub].total += row.counts.totalRowStudents;
          subjectMap[sub].assessed += row.counts.totalAssessed;
        });

        return Object.values(subjectMap).map(subData => {
          const sum = subData.total || 1;
          if (activeModule === 'uasa') {
            return {
              ...subData,
              baikRate: parseFloat((((subData.a + subData.b + subData.c) / sum) * 100).toFixed(1)),
              nearMissRate: parseFloat((((subData.d + subData.e) / sum) * 100).toFixed(1)),
              intervensiRate: parseFloat(((subData.f / sum) * 100).toFixed(1)),
            };
          } else {
            return {
              ...subData,
              passRate: parseFloat((((subData.tp3 + subData.tp4 + subData.tp5 + subData.tp6) / sum) * 100).toFixed(1)),
              excelRate: parseFloat((((subData.tp5 + subData.tp6) / sum) * 100).toFixed(1)),
              critRate: parseFloat((((subData.tp1 + subData.tp2) / sum) * 100).toFixed(1)),
            };
          }
        }).sort((a, b) => {
          const metricKey = activeSubjectMetric;
          return (b[metricKey] || 0) - (a[metricKey] || 0);
        });
      }, [rowsFilteredExceptSubject, activeSubjectMetric, activeModule]);

      const selectedSubjectDetails = React.useMemo(() => {
        if (!selectedAnalysisSubject) return null;
        return subjectAnalysisList.find(s => s.subjectName === selectedAnalysisSubject) || null;
      }, [subjectAnalysisList, selectedAnalysisSubject]);

      const sortedAndFilteredRows = React.useMemo(() => {
        let rows = [...filteredRows];

        if (tableSearchTerm.trim() !== '') {
          const query = tableSearchTerm.toLowerCase();
          rows = rows.filter(r => 
            r.categories.school.toLowerCase().includes(query) || 
            r.categories.schoolCode.toLowerCase().includes(query)
          );
        }

        if (!sortConfig.key) return rows;

        rows.sort((a, b) => {
          let valA, valB;

          if (['school', 'ppd', 'level', 'subject', 'skill'].includes(sortConfig.key)) {
            valA = a.categories[sortConfig.key] || '';
            valB = b.categories[sortConfig.key] || '';
            return sortConfig.direction === 'asc' ? valA.localeCompare(valB) : valB.localeCompare(valA);
          }

          if (activeModule === 'uasa') {
            if (sortConfig.key === 'baik') {
              valA = a.counts.a + a.counts.b + a.counts.c;
              valB = b.counts.a + b.counts.b + b.counts.c;
            } else if (sortConfig.key === 'nearMiss') {
              valA = a.counts.d + a.counts.e;
              valB = b.counts.d + b.counts.e;
            } else if (sortConfig.key === 'intervensi') {
              valA = a.counts.f;
              valB = b.counts.f;
            } else if (sortConfig.key === 'th') {
              valA = a.counts.th;
              valB = b.counts.th;
            }
          } else {
            if (sortConfig.key === 'tp12') {
              valA = a.counts.tp1 + a.counts.tp2;
              valB = b.counts.tp1 + b.counts.tp2;
            } else if (sortConfig.key === 'tp34') {
              valA = a.counts.tp3 + a.counts.tp4;
              valB = b.counts.tp3 + b.counts.tp4;
            } else if (sortConfig.key === 'tp56') {
              valA = a.counts.tp5 + a.counts.tp6;
              valB = b.counts.tp5 + b.counts.tp6;
            } else if (sortConfig.key === 'td') {
              valA = a.counts.td;
              valB = b.counts.td;
            }
          }

          if (valA < valB) return sortConfig.direction === 'asc' ? -1 : 1;
          if (valA > valB) return sortConfig.direction === 'asc' ? 1 : -1;
          return 0;
        });

        return rows;
      }, [filteredRows, sortConfig, tableSearchTerm, activeModule]);

      const totalPages = Math.ceil(sortedAndFilteredRows.length / itemsPerPage) || 1;
      const paginatedRows = React.useMemo(() => {
        const start = (currentPage - 1) * itemsPerPage;
        return sortedAndFilteredRows.slice(start, start + itemsPerPage);
      }, [sortedAndFilteredRows, currentPage]);

      React.useEffect(() => {
        setCurrentPage(1);
      }, [tableSearchTerm, activeFilters, activeModule]);

      const resetFilters = () => {
        setActiveFilters({
          ppd: 'ALL',
          school: 'ALL',
          schoolCode: 'ALL',
          schoolType: 'ALL',
          level: 'ALL',
          subject: 'ALL',
          location: 'ALL',
          dlp: 'ALL',
          skill: 'ALL'
        });
        setTableSearchTerm('');
        setSortConfig({ key: 'school', direction: 'asc' });
        setClickedBar(null);
        setClickedGroupedBar(null);
      };

      const filterMetadata = {
        ppd: { label: 'Pejabat Pendidikan Daerah (PPD)', icon: IconSchool },
        school: { label: 'Nama Institusi / Sekolah', icon: IconSchool },
        schoolCode: { label: 'Kod Sekolah', icon: IconLayers },
        schoolType: { label: 'Jenis Sekolah', icon: IconSchool },
        level: { label: 'Tahun / Tingkatan', icon: IconLayers },
        subject: { label: 'Mata Pelajaran (MP)', icon: IconBookOpen },
        ...(activeModule === 'pbd_kemahiran' && hasSkillSchema ? { skill: { label: 'Kemahiran / Aspek', icon: IconAward } } : {}),
        location: { label: 'Lokasi Kawasan', icon: IconMapPin },
        dlp: { label: 'Status DLP', icon: IconSparkles }
      };

      const formatTimestamp = (ts) => {
        if (!ts) return "Baru Sahaja";
        const date = ts.toDate ? ts.toDate() : new Date(ts);
        let hours = date.getHours();
        let minutes = date.getMinutes();
        const ampm = hours >= 12 ? 'PM' : 'AM';
        hours = hours % 12 || 12;
        minutes = minutes < 10 ? '0' + minutes : minutes;
        return date.toLocaleDateString('ms-MY', { day: 'numeric', month: 'short' }) + ", " + hours + ":" + minutes + " " + ampm;
      };

      if (!isLoggedIn) {
        return (
          <div className="min-h-screen flex flex-col justify-between text-slate-800 bg-[#F1F5F9] relative scroll-touch-opt overflow-y-auto">
            
            {/* TOAST NOTIFIKASI TERAPUNG */}
            {toast.show && (
              <div className="fixed top-5 right-5 z-50 transform translate-y-0 transition-all duration-300 ease-out bg-white border-l-4 border-red-500 shadow-lg rounded-md p-4 max-w-sm flex items-start space-x-3">
                <div className="text-red-500">
                  <i className="fas fa-exclamation-circle text-lg"></i>
                </div>
                <div className="flex-1">
                  <h4 className="font-semibold text-sm text-slate-800">{toast.title}</h4>
                  <p className="text-xs text-slate-600 mt-1">{toast.desc}</p>
                </div>
                <button onClick={() => setToast(prev => ({ ...prev, show: false }))} className="text-slate-400 hover:text-slate-600">
                  <i className="fas fa-times"></i>
                </button>
              </div>
            )}

            <div className="flex-grow flex flex-col items-center justify-center p-4 sm:p-6 md:p-8">
              
              {/* SKRIN 1: SKRIN LOG MASUK DELIMa */}
              {authScreen === 'login' && (
                <div className="w-full max-w-md bg-white rounded-2xl border border-slate-200 p-6 sm:p-8 shadow-xl">
                  <div className="flex flex-col items-center text-center mb-8">
                    <img src="https://raw.githubusercontent.com/mohdnorzaini-ship-it/pbd/main/1.png" alt="Jata Perak" className="h-20 sm:h-24 mb-4 object-contain" />
                    <h1 className="text-xl sm:text-2xl font-bold text-slate-800">Sistem Analisis PBD Perak</h1>
                    <p className="text-xs sm:text-sm text-slate-500 mt-1">Gunakan Akaun DELIMa untuk mengakses analisis</p>
                    
                    <div className="mt-3 inline-flex items-center space-x-1.5 px-3 py-1 bg-yellow-50 text-yellow-800 rounded-full text-xs font-semibold border border-yellow-200">
                      <i className="fas fa-landmark"></i>
                      <span>Jabatan Pendidikan Negeri Perak</span>
                    </div>
                  </div>

                  <form className="space-y-6" onSubmit={handleLoginSubmit}>
                    <div>
                      <label className="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-2">E-mel DELIMa</label>
                      <div className="relative">
                        <span className="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400">
                          <i className="fas fa-envelope"></i>
                        </span>
                        <input type="text" required value={loginEmail} onChange={(e) => setLoginEmail(e.target.value)}
                               className="w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 text-sm transition-all"
                               placeholder="g-12345678@moe-dl.edu.my" />
                      </div>
                      <p className="text-[11px] text-slate-400 mt-2 leading-relaxed">
                        * Mesti diakhiri dengan <strong className="text-slate-600">@moe-dl.edu.my</strong> atau <strong className="text-slate-600">@dl.edu.my</strong>
                      </p>
                    </div>

                    <div>
                      <div className="flex justify-between items-center mb-2">
                        <label className="block text-xs font-semibold uppercase tracking-wider text-slate-500">Kata Laluan</label>
                        <button type="button" className="text-xs font-medium text-blue-600 hover:underline" onClick={() => setShowResetModal(true)}>Lupa kata laluan?</button>
                      </div>
                      <div className="relative">
                        <span className="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400">
                          <i className="fas fa-lock"></i>
                        </span>
                        <input type="password" required value={loginPassword} onChange={(e) => setLoginPassword(e.target.value)}
                               className="w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 text-sm transition-all"
                               placeholder="••••••••" />
                      </div>
                    </div>

                    <div className="pt-2">
                      <button type="submit" className="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-4 rounded-xl shadow-lg hover:shadow-blue-600/20 transition-all flex items-center justify-center space-x-2">
                        <span>Log Masuk</span>
                        <i className="fas fa-sign-in-alt text-xs"></i>
                      </button>
                    </div>
                  </form>

                  <div className="mt-8 pt-6 border-t border-slate-100 text-center text-xs text-slate-400">
                    <p>Sila masukkan e-mel DELIMa anda. Jika belum mendaftar, sistem akan membawa anda ke halaman cipta profil selepas klik membuat pendaftaran.</p>
                  </div>
                </div>
              )}

              {/* SKRIN 2: PENDAFTARAN PROFIL BARU */}
              {authScreen === 'register' && (
                <div className="w-full max-w-md bg-white rounded-2xl border border-slate-200 p-6 sm:p-8 shadow-xl">
                  <div className="text-center mb-6">
                    <img src="https://raw.githubusercontent.com/mohdnorzaini-ship-it/pbd/main/1.png" alt="Jata Perak" className="h-16 mx-auto mb-3 object-contain" />
                    <h1 className="text-lg sm:text-xl font-bold text-slate-800">Cipta Profil PBD Anda</h1>
                    <p className="text-xs sm:text-sm text-slate-500 mt-1">E-mel anda dikesan belum berdaftar. Sila lengkapkan butiran berikut untuk mendaftar profil anda.</p>
                  </div>

                  <form className="space-y-4" onSubmit={handleRegisterSubmit}>
                    <div>
                      <label className="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1">E-mel DELIMa</label>
                      <input type="text" disabled value={loginEmail} className="w-full px-4 py-2.5 bg-slate-100 border border-slate-200 rounded-xl text-slate-500 text-sm font-medium cursor-not-allowed" />
                    </div>

                    <div>
                      <label className="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-1">Cipta Kata Laluan</label>
                      <input type="password" required minLength={6} value={regPassword} onChange={(e) => setRegPassword(e.target.value)} className="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500/20 text-sm" placeholder="Minimum 6 aksara" />
                    </div>

                    <div>
                      <label className="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-1">Nama Penuh</label>
                      <input type="text" required value={regName} onChange={(e) => setRegName(e.target.value)} className="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500/20 text-sm" placeholder="MOHD NORZAINI BIN MOHD ZAIN" />
                    </div>

                    <div>
                      <label className="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-1">Sektor / Jabatan / Daerah (Perak)</label>
                      <select required value={regState} onChange={(e) => setRegState(e.target.value)} className="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500/20 text-sm">
                        <option value="JPN PERAK">JPN PERAK</option>
                        <option value="DAERAH BAGAN DATUK">DAERAH BAGAN DATUK</option>
                        <option value="DAERAH BATANG PADANG">DAERAH BATANG PADANG</option>
                        <option value="DAERAH HILIR PERAK">DAERAH HILIR PERAK</option>
                        <option value="DAERAH HULU PERAK">DAERAH HULU PERAK</option>
                        <option value="DAERAH KINTA SELATAN">DAERAH KINTA SELATAN</option>
                        <option value="DAERAH KINTA UTARA">DAERAH KINTA UTARA</option>
                        <option value="DAERAH KUALA KANGSAR">DAERAH KUALA KANGSAR</option>
                        <option value="DAERAH LARUT, MATANG DAN SELAMA">DAERAH LARUT, MATANG DAN SELAMA</option>
                        <option value="DAERAH MANJUNG">DAERAH MANJUNG</option>
                        <option value="DAERAH MUALLIM">DAERAH MUALLIM</option>
                        <option value="DAERAH PERAK TENGAH">DAERAH PERAK TENGAH</option>
                      </select>
                    </div>

                    <div>
                      <label className="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-1">Kod Pengguna (Contoh: CM36)</label>
                      <input type="text" required value={regCode} onChange={(e) => setRegCode(e.target.value)} className="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500/20 text-sm" placeholder="CM36" />
                    </div>

                    <div className="pt-2 flex space-x-3">
                      <button type="button" onClick={() => setAuthScreen('login')} className="w-1/3 border border-slate-200 text-slate-500 hover:bg-slate-50 font-semibold py-3 rounded-xl text-xs transition-all">Kembali</button>
                      <button type="submit" className="w-2/3 bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-3 rounded-xl text-xs shadow-lg transition-all">Cipta Profil & Daftar</button>
                    </div>
                  </form>
                </div>
              )}

            </div>

            {/* MODAL RECOVERY KATA LALUAN */}
            {showResetModal && (
              <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                <div className="bg-white w-full max-w-md rounded-2xl shadow-2xl border border-slate-200 overflow-hidden flex flex-col">
                  <div className="px-6 py-4 bg-slate-50 border-b border-slate-100 flex justify-between items-center">
                    <h3 className="font-bold text-slate-800 text-sm flex items-center space-x-2">
                      <i className="fas fa-key text-blue-600"></i>
                      <span>Set Semula Kata Laluan</span>
                    </h3>
                    <button onClick={() => setShowResetModal(false)} className="text-slate-400 hover:text-slate-600">
                      <i className="fas fa-times"></i>
                    </button>
                  </div>
                  <form onSubmit={handleResetPasswordSubmit} className="p-6 space-y-4">
                    <p className="text-xs text-slate-500 leading-relaxed">
                      Lengkapkan butiran berikut untuk menetapkan kata laluan baharu secara mandiri.
                    </p>

                    <div>
                      <label className="block text-[10px] font-bold uppercase tracking-wider text-slate-500 mb-1">E-mel DELIMa Terdaftar</label>
                      <input type="email" required value={resetEmail} onChange={(e) => setResetEmail(e.target.value)} className="w-full px-3 py-2 border border-slate-200 rounded-lg text-xs" placeholder="g-12345678@moe-dl.edu.my" />
                    </div>

                    <div>
                      <label className="block text-[10px] font-bold uppercase tracking-wider text-slate-500 mb-1">Nama Penuh (Huruf Besar)</label>
                      <input type="text" required value={resetName} onChange={(e) => setResetName(e.target.value)} className="w-full px-3 py-2 border border-slate-200 rounded-lg text-xs" placeholder="MOHD NORZAINI BIN MOHD ZAIN" />
                    </div>

                    <div>
                      <label className="block text-[10px] font-bold uppercase tracking-wider text-slate-500 mb-1">Kod Pengguna (Contoh: CM36)</label>
                      <input type="text" required value={resetCode} onChange={(e) => setResetCode(e.target.value)} className="w-full px-3 py-2 border border-slate-200 rounded-lg text-xs" placeholder="CM36" />
                    </div>

                    <div className="pt-2 border-t border-slate-100">
                      <label className="block text-[10px] font-bold uppercase tracking-wider text-slate-500 mb-1">Kata Laluan Baharu</label>
                      <input type="password" required minLength={6} value={resetNewPassword} onChange={(e) => setResetNewPassword(e.target.value)} className="w-full px-3 py-2 border border-slate-200 rounded-lg text-xs" placeholder="Minimum 6 aksara" />
                    </div>

                    <div className="pt-4 flex justify-end space-x-3">
                      <button type="button" onClick={() => setShowResetModal(false)} className="px-4 py-2 text-xs font-semibold text-slate-500 hover:bg-slate-100 rounded-xl">Batal</button>
                      <button type="submit" className="px-4 py-2 text-xs font-semibold text-white bg-blue-600 hover:bg-blue-700 rounded-xl">Simpan Kata Laluan</button>
                    </div>
                  </form>
                </div>
              </div>
            )}

            {/* TETAPAN CONFIG COG FLOATING BUTTON */}
            <button onClick={() => setShowConfigModal(true)} className="fixed bottom-5 left-5 z-40 h-10 w-10 bg-slate-800 hover:bg-slate-950 text-white rounded-full shadow-lg flex items-center justify-center transition-all hover:scale-110">
              <i className="fas fa-cog text-base"></i>
            </button>

            {/* MODAL CONFIG OVERRIDE */}
            {showConfigModal && (
              <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                <div className="bg-white w-full max-w-lg rounded-2xl shadow-2xl border border-slate-200 overflow-hidden flex flex-col">
                  <div className="px-6 py-4 bg-slate-50 border-b border-slate-100 flex justify-between items-center">
                    <h3 className="font-bold text-slate-800 text-sm flex items-center space-x-2">
                      <i className="fas fa-cog text-blue-600"></i>
                      <span>Tetapan Konfigurasi Firebase</span>
                    </h3>
                    <button onClick={() => setShowConfigModal(false)} className="text-slate-400 hover:text-slate-600">
                      <i className="fas fa-times"></i>
                    </button>
                  </div>
                  <div className="p-6 space-y-4 overflow-y-auto max-h-[70vh]">
                    <p className="text-xs text-slate-500 leading-relaxed">
                      Uruskan sambungan pangkalan data anda di bawah.
                    </p>

                    <div className="space-y-3">
                      <div className="flex items-center space-x-3 p-3 bg-blue-50 rounded-xl border border-blue-100">
                        <input type="radio" id="cfg-auto" name="cfg-src" checked={configSource === 'auto'} onChange={() => setConfigSource('auto')} className="h-4 w-4" />
                        <label htmlFor="cfg-auto" className="flex-1 cursor-pointer">
                          <span className="block text-xs font-bold text-blue-800">Gunakan Konfigurasi Platform (Automatik)</span>
                          <span className="block text-[10px] text-blue-500">Menghubungkan terus ke Firebase bersepadu.</span>
                        </label>
                      </div>

                      <div className="flex items-center space-x-3 p-3 bg-slate-50 rounded-xl border border-slate-200">
                        <input type="radio" id="cfg-manual" name="cfg-src" checked={configSource === 'manual'} onChange={() => setConfigSource('manual')} className="h-4 w-4" />
                        <label htmlFor="cfg-manual" className="flex-1 cursor-pointer">
                          <span className="block text-xs font-bold text-slate-700">Masukkan Konfigurasi Sendiri (Manual)</span>
                          <span className="block text-[10px] text-slate-400">Gunakan projek Firebase peribadi anda sendiri.</span>
                        </label>
                      </div>
                    </div>

                    {configSource === 'manual' && (
                      <div className="space-y-3 pt-2">
                        <div className="grid grid-cols-2 gap-3">
                          <div>
                            <label className="block text-[10px] font-bold uppercase tracking-wider text-slate-500 mb-1">API Key</label>
                            <input type="text" value={cfgApiKey} onChange={(e) => setCfgApiKey(e.target.value)} className="w-full px-3 py-2 border border-slate-200 rounded-lg text-xs font-mono" placeholder="AIzaSy..." />
                          </div>
                          <div>
                            <label className="block text-[10px] font-bold uppercase tracking-wider text-slate-500 mb-1">Auth Domain</label>
                            <input type="text" value={cfgAuthDomain} onChange={(e) => setCfgAuthDomain(e.target.value)} className="w-full px-3 py-2 border border-slate-200 rounded-lg text-xs font-mono" placeholder="project.firebaseapp.com" />
                          </div>
                        </div>
                        <div className="grid grid-cols-2 gap-3">
                          <div>
                            <label className="block text-[10px] font-bold uppercase tracking-wider text-slate-500 mb-1">Project ID</label>
                            <input type="text" value={cfgProjectId} onChange={(e) => setCfgProjectId(e.target.value)} className="w-full px-3 py-2 border border-slate-200 rounded-lg text-xs font-mono" placeholder="project-id" />
                          </div>
                          <div>
                            <label className="block text-[10px] font-bold uppercase tracking-wider text-slate-500 mb-1">Storage Bucket</label>
                            <input type="text" value={cfgStorageBucket} onChange={(e) => setCfgStorageBucket(e.target.value)} className="w-full px-3 py-2 border border-slate-200 rounded-lg text-xs font-mono" placeholder="project.appspot.com" />
                          </div>
                        </div>
                        <div className="grid grid-cols-2 gap-3">
                          <div>
                            <label className="block text-[10px] font-bold uppercase tracking-wider text-slate-500 mb-1">Messaging Sender ID</label>
                            <input type="text" value={cfgMessagingSenderId} onChange={(e) => setCfgMessagingSenderId(e.target.value)} className="w-full px-3 py-2 border border-slate-200 rounded-lg text-xs font-mono" placeholder="1234567" />
                          </div>
                          <div>
                            <label className="block text-[10px] font-bold uppercase tracking-wider text-slate-500 mb-1">App ID</label>
                            <input type="text" value={cfgAppId} onChange={(e) => setCfgAppId(e.target.value)} className="w-full px-3 py-2 border border-slate-200 rounded-lg text-xs font-mono" placeholder="1:123:web..." />
                          </div>
                        </div>
                      </div>
                    )}
                  </div>
                  <div className="px-6 py-4 bg-slate-50 border-t border-slate-100 flex justify-end space-x-3">
                    <button onClick={() => setShowConfigModal(false)} className="px-4 py-2 text-xs font-semibold text-slate-500 hover:bg-slate-100 rounded-xl">Batal</button>
                    <button onClick={saveFirebaseConfigOverride} className="px-4 py-2 text-xs font-semibold text-white bg-blue-600 hover:bg-blue-700 rounded-xl shadow-md">Simpan & Muat Semula</button>
                  </div>
                </div>
              </div>
            )}

            <footer className="bg-slate-900 text-slate-400 text-xs py-6 border-t border-slate-800 w-full mt-12">
              <div className="max-w-6xl mx-auto px-6 flex flex-col md:flex-row justify-between items-center gap-4">
                <div className="flex items-center space-x-2">
                  <div className="h-6 w-6 bg-slate-800 rounded-md flex items-center justify-center text-white text-[10px] font-bold">P</div>
                  <span className="font-semibold text-slate-300">Sistem Analisis PBD Perak</span>
                </div>
                <p>&copy; 2026 Jabatan Pendidikan Negeri Perak. Diperkasa secara selamat oleh Firebase Firestore.</p>
              </div>
            </footer>
          </div>
        );
      }

      return (
        <div className="flex h-screen bg-[#F8FAFC] overflow-hidden font-sans text-slate-800 relative">
          
          {/* MOBILE MENU BACKDROP */}
          {mobileMenuOpen && (
            <div 
              className="fixed inset-0 bg-slate-900/60 backdrop-blur-xs z-40 md:hidden transition-opacity duration-300"
              onClick={() => setMobileMenuOpen(false)}
            />
          )}

          {/* PANEL NAVIGASI SISI (SIDEBAR BERSEPADU - RESPONSIVE DRAWER) */}
          <aside className={`fixed inset-y-0 left-0 z-50 w-72 bg-gradient-to-b from-[#4F359B] to-[#3B257B] text-white flex flex-col shrink-0 shadow-2xl transition-transform duration-300 md:translate-x-0 md:static md:h-screen ${mobileMenuOpen ? 'translate-x-0' : '-translate-x-full'}`}>
            <div className="p-6 border-b border-[#ffffff15] flex items-center justify-between gap-3">
              <div className="flex items-center gap-3">
                <div className="w-12 h-12 rounded-2xl bg-amber-400 flex items-center justify-center font-black text-[#4F359B] text-xl shadow-lg">JPN</div>
                <div>
                  <h2 className="font-extrabold text-xs sm:text-sm leading-tight uppercase tracking-wider">Portal Bersepadu</h2>
                  <p className="text-[10px] text-purple-200 font-semibold tracking-wide mt-1">JPN NEGERI PERAK • SESI 2025</p>
                </div>
              </div>
              <button 
                onClick={() => setMobileMenuOpen(false)} 
                className="md:hidden p-2 text-purple-200 hover:text-white hover:bg-white/10 rounded-xl transition"
                title="Tutup Menu"
              >
                <i className="fas fa-times text-lg"></i>
              </button>
            </div>

            {/* Pemilihan Modul Utama */}
            <div className="p-4 border-b border-[#ffffff10] bg-[#331d6d]">
              <span className="text-[9px] font-black text-purple-200 uppercase tracking-widest block mb-2.5">PILIH PORTAL UTAMA:</span>
              <div className="space-y-1.5">
                {[
                  { key: 'uasa', label: 'UASA KESELURUHAN 2025', color: 'border-amber-400', icon: 'fa-graduation-cap' },
                  { key: 'pbd_keseluruhan', label: 'PBD KESELURUHAN 2025', color: 'border-emerald-400', icon: 'fa-book-reader' },
                  { key: 'pbd_kemahiran', label: 'PBD KEMAHIRAN 2025', color: 'border-blue-400', icon: 'fa-award' },
                  { key: 'profil', label: 'PROFIL & STATISTIK', color: 'border-purple-400', icon: 'fa-user-circle' }
                ].map(portal => (
                  <button
                    key={portal.key}
                    onClick={() => {
                      setActiveModule(portal.key);
                      setClickedBar(null);
                      setClickedGroupedBar(null);
                      setTableSearchTerm('');
                      setMobileMenuOpen(false); // Auto close menu on choice (mobile)
                      resetFilters();
                    }}
                    className={`w-full text-left px-4 py-3 rounded-xl text-xs font-black transition-all border-l-4 flex items-center justify-between ${
                      activeModule === portal.key
                        ? 'bg-white text-[#3B257B] shadow-md border-amber-400'
                        : 'text-purple-100 hover:bg-white/5 border-transparent'
                    }`}
                  >
                    <span className="flex items-center space-x-2">
                      <i className={`fas ${portal.icon} mr-1`}></i>
                      <span>{portal.label}</span>
                    </span>
                    {activeModule === portal.key && <span className="w-2 h-2 rounded-full bg-amber-400 animate-ping"></span>}
                  </button>
                ))}
              </div>
            </div>

            {/* Menu Sub-Tab (Hanya aktif jika bukan portal profil) */}
            {activeModule !== 'profil' ? (
              <nav className="p-4 flex-1 space-y-1.5 overflow-y-auto no-scrollbar">
                <span className="text-[9px] font-black text-purple-200 uppercase tracking-widest block mb-1">MENU SUB-TAB:</span>
                <button 
                  onClick={() => { setActiveTab('ringkasan'); setClickedBar(null); setClickedGroupedBar(null); setMobileMenuOpen(false); }} 
                  className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl text-xs font-bold uppercase tracking-wide transition-all ${activeTab === 'ringkasan' ? 'bg-amber-400 text-[#3B257B] shadow-md' : 'text-purple-100 hover:bg-white/10'}`}
                >
                  <IconDashboard /> Dashboard Utama
                </button>
                <button 
                  onClick={() => { setActiveTab('subjek'); setClickedBar(null); setClickedGroupedBar(null); setMobileMenuOpen(false); }} 
                  className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl text-xs font-bold uppercase tracking-wide transition-all ${activeTab === 'subjek' ? 'bg-amber-400 text-[#3B257B] shadow-md' : 'text-purple-100 hover:bg-white/10'}`}
                >
                  <IconBookOpen /> Analisis Mata Pelajaran
                </button>
              </nav>
            ) : (
              <div className="p-4 flex-1 text-xs text-purple-200">
                <span className="text-[9px] font-black text-purple-200 uppercase tracking-widest block mb-3">INFO PROFIL</span>
                <p className="leading-relaxed opacity-80">
                  Tab Profil memaparkan Kad Profil anda, maklumat kekerapan akses portal, senarai kedudukan ranking serta log masuk terkini dari seluruh Perak.
                </p>
              </div>
            )}

            {/* Panel Muat Naik Berkas Dinamik */}
            {activeModule !== 'profil' && (
              <div className="p-4 border-t border-[#ffffff15] bg-[#2d1b61] space-y-3">
                <p className="text-[10px] font-bold text-purple-200 uppercase tracking-wider block">Muat Naik Data manual ({activeModule.toUpperCase()})</p>
                <label className="flex items-center justify-center gap-2 px-3 py-2.5 bg-purple-800 hover:bg-purple-700 text-white rounded-xl text-xs font-black border border-purple-600 cursor-pointer transition-all shadow-inner">
                  <IconUpload />
                  <span>Pilih Fail (.xlsx, .csv)</span>
                  <input type="file" accept=".xlsx, .xls, .csv" onChange={handleManualUpload} className="hidden" />
                </label>
              </div>
            )}

            {/* Pautan Muat Turun Data Mentah */}
            <div className="p-4 border-t border-[#ffffff15] bg-[#251553] space-y-2.5">
              <p className="text-[10px] font-black text-purple-200 uppercase tracking-wider block flex items-center gap-1.5">
                <i className="fas fa-cloud-download-alt text-amber-400 text-xs"></i>
                <span>Muat Turun Data Mentah</span>
              </p>
              <div className="space-y-1.5">
                <a 
                  href="https://drive.google.com/file/d/16LQgWkgtqpiwJxp8b1acKRDPrlP6ScQm/view?usp=drive_link" 
                  target="_blank" 
                  rel="noopener noreferrer" 
                  className="flex items-center justify-between px-3 py-2 bg-white/5 hover:bg-white/10 text-purple-100 rounded-lg text-[10px] font-bold transition-all border border-white/5 hover:border-purple-400/30"
                >
                  <span className="truncate mr-1">1. Templat / Data UASA 2025</span>
                  <i className="fas fa-external-link-alt text-[8px] text-purple-300 shrink-0"></i>
                </a>
                <a 
                  href="https://drive.google.com/file/d/18OFpDZB0YFIZ-Cr4rZuGoFbJRrVduOie/view?usp=drive_link" 
                  target="_blank" 
                  rel="noopener noreferrer" 
                  className="flex items-center justify-between px-3 py-2 bg-white/5 hover:bg-white/10 text-purple-100 rounded-lg text-[10px] font-bold transition-all border border-white/5 hover:border-purple-400/30"
                >
                  <span className="truncate mr-1">2. Templat / Data PBD 2025</span>
                  <i className="fas fa-external-link-alt text-[8px] text-purple-300 shrink-0"></i>
                </a>
                <a 
                  href="https://drive.google.com/file/d/1Avt6x-tVliyZr5S_X1VIuFp_LFnFxlCE/view?usp=drive_link" 
                  target="_blank" 
                  rel="noopener noreferrer" 
                  className="flex items-center justify-between px-3 py-2 bg-white/5 hover:bg-white/10 text-purple-100 rounded-lg text-[10px] font-bold transition-all border border-white/5 hover:border-purple-400/30"
                >
                  <span className="truncate mr-1">3. Templat / Data PBD Kemahiran</span>
                  <i className="fas fa-external-link-alt text-[8px] text-purple-300 shrink-0"></i>
                </a>
              </div>
            </div>

            <div className="p-5 bg-[#1d0e40] text-[10px] space-y-1 text-purple-300 border-t border-[#ffffff08] shrink-0">
              <p className="font-semibold text-emerald-400">● Modul Berhubung Dinamik</p>
              <p>© 2026 JPN • Portal Versi 5.0</p>
            </div>
          </aside>

          {/* AREA RUANG KERJA KANAN */}
          <main className="flex-1 flex flex-col overflow-hidden w-full">
            
            {/* ATASAN HEADER */}
            <header className="h-16 bg-white border-b border-slate-200 px-4 md:px-8 flex items-center justify-between shrink-0 shadow-sm z-20">
              <div className="flex items-center gap-3 text-xs font-semibold overflow-hidden">
                <button 
                  onClick={() => setMobileMenuOpen(true)} 
                  className="md:hidden p-2 bg-slate-50 border border-slate-200 hover:bg-slate-100 rounded-xl text-slate-600 shrink-0"
                  title="Buka Menu"
                >
                  <i className="fas fa-bars text-sm"></i>
                </button>
                <span className="text-slate-400 font-bold uppercase tracking-wider text-[10px] hidden sm:inline">E-mel DELIMa:</span>
                <span className="bg-blue-50 text-blue-700 px-3 py-1.5 rounded-full border border-blue-100 flex items-center gap-1.5 font-bold truncate max-w-[140px] sm:max-w-none">
                  <i className="fas fa-envelope text-blue-500"></i>
                  {activeDelimaUser?.email}
                </span>
                <div className="h-4 w-px bg-slate-200 hidden sm:block"></div>
                <span className="text-slate-400 font-bold uppercase tracking-wider text-[10px] hidden lg:inline">Pangkalan Data:</span>
                {isManualLoaded[activeModule] ? (
                  <span className="bg-amber-50 text-amber-700 px-3.5 py-1.5 rounded-full border border-amber-100 flex items-center gap-1.5 font-bold hidden sm:flex shrink-0">
                    <span className="w-2.5 h-2.5 rounded-full bg-amber-500"></span>
                    Fail Manual
                  </span>
                ) : (
                  <span className="bg-emerald-50 text-emerald-700 px-3.5 py-1.5 rounded-full border border-emerald-100 flex items-center gap-1.5 font-bold hidden sm:flex shrink-0">
                    <span className="w-2.5 h-2.5 rounded-full bg-emerald-500 animate-ping"></span>
                    Sambungan Live
                  </span>
                )}
              </div>
              
              <div className="flex items-center gap-2 md:gap-4 shrink-0">
                <button 
                  onClick={() => {
                    if (activeModule !== 'profil') {
                      setRawRows(prev => ({ ...prev, [activeModule]: [] }));
                      setIsManualLoaded(prev => ({ ...prev, [activeModule]: false }));
                    } else {
                      setupRealtimeListeners();
                    }
                  }} 
                  className="p-2 sm:p-2.5 bg-slate-50 border border-slate-200 hover:bg-slate-100 rounded-xl transition text-slate-600 flex items-center gap-1 text-xs font-bold" 
                  title="Tarik Semula Data"
                >
                  <svg className="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 1121.21 15H19M9 5a9 9 0 018.967 8.967m-8.967-8.967L12 3M9 5l3 3" />
                  </svg>
                  <span className="hidden sm:inline">Segar Semula</span>
                </button>
                <div className="h-8 w-px bg-slate-200 hidden sm:block"></div>
                <div className="flex items-center gap-2 md:gap-3">
                  <div className="text-right hidden sm:block">
                    <p className="text-xs font-black text-slate-900 leading-none truncate max-w-[120px] uppercase">{activeDelimaUser?.name}</p>
                    <p className="text-[10px] text-slate-400 font-bold mt-1 uppercase">{activeDelimaUser?.state}</p>
                  </div>
                  <button onClick={handleLogout} className="px-2.5 py-1.5 sm:px-3.5 sm:py-2 text-xs font-bold text-rose-600 bg-rose-50 hover:bg-rose-100 rounded-xl border border-rose-100 transition duration-150 flex items-center space-x-1 shrink-0">
                    <i className="fas fa-sign-out-alt"></i>
                    <span className="hidden xs:inline">Keluar</span>
                  </button>
                </div>
              </div>
            </header>

            {/* AREA UTAMA DENGAN SKROLL (OPTIMIZED FOR MOBILE TOUCH SCROLLING) */}
            <div className="flex-1 overflow-y-auto p-4 md:p-8 space-y-6 md:space-y-8 bg-[#F8FAFC] scroll-touch-opt">
              
              {/* TOAST INTERNAL APPLICATION */}
              {toast.show && (
