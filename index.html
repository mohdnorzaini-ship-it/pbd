                                  <tr key={i} className="hover:bg-slate-50 transition-colors">
                                    <td className="p-4">
                                      <span className="text-[9px] font-mono font-bold text-purple-600 bg-purple-50 px-1.5 py-0.5 rounded leading-none block w-max">{row.categories.schoolCode}</span>
                                      <span className="text-xs font-bold text-slate-800 mt-1 block truncate max-w-[240px]" title={row.categories.school}>{row.categories.school}</span>
                                    </td>
                                    <td className="p-4 font-semibold text-slate-600 uppercase">{row.categories.ppd}</td>
                                    <td className="p-4 font-semibold text-slate-600">{row.categories.level}</td>
                                    <td className="p-4 font-bold text-slate-800">{row.categories.subject}</td>

                                    {activeModule === 'pbd_kemahiran' && hasSkillSchema && (
                                      <td className="p-4 text-slate-500 max-w-xs font-semibold leading-normal truncate" title={row.categories.skill}>
                                        {row.categories.skill}
                                      </td>
                                    )}

                                    {activeModule === 'uasa' ? (
                                      <React.Fragment>
                                        <td className="p-4 text-center font-extrabold text-emerald-600 bg-emerald-50/20">{(row.counts.a + row.counts.b + row.counts.c).toLocaleString()}</td>
                                        <td className="p-4 text-center font-extrabold text-amber-500 bg-amber-50/20">{(row.counts.d + row.counts.e).toLocaleString()}</td>
                                        <td className="p-4 text-center font-extrabold text-rose-600 bg-rose-50/20">{(row.counts.f).toLocaleString()}</td>
                                        <td className="p-4 text-center font-medium text-slate-400">{(row.counts.th).toLocaleString()}</td>
                                      </React.Fragment>
                                    ) : (
                                      <React.Fragment>
                                        <td className="p-4 text-center font-extrabold text-rose-600 bg-rose-50/20">{(row.counts.tp1 + row.counts.tp2).toLocaleString()}</td>
                                        <td className="p-4 text-center font-extrabold text-[#4F359B] bg-purple-50/10">{(row.counts.tp3 + row.counts.tp4).toLocaleString()}</td>
                                        <td className="p-4 text-center font-extrabold text-emerald-600 bg-emerald-50/10">{(row.counts.tp5 + row.counts.tp6).toLocaleString()}</td>
                                        <td className="p-4 text-center font-medium text-slate-400">{(row.counts.td).toLocaleString()}</td>
                                      </React.Fragment>
                                    )}
                                  </tr>
                                );
                              })}
                              {paginatedRows.length === 0 && (
                                <tr>
                                  <td colSpan={10} className="p-8 text-center text-slate-400 font-bold">
                                    Tiada rekod data yang sepadan dengan kriteria saringan semasa.
                                  </td>
                                </tr>
                              )}
                            </tbody>
                          </table>
                        </div>

                        {/* PAGINATION CONTROLS */}
                        <div className="flex flex-col sm:flex-row justify-between items-center gap-4 bg-slate-50 p-4 rounded-2xl border border-slate-100">
                          <p className="text-[10px] font-bold text-slate-500">
                            Menunjukkan {((currentPage - 1) * itemsPerPage + 1).toLocaleString()} hingga {Math.min(currentPage * itemsPerPage, sortedAndFilteredRows.length).toLocaleString()} daripada {sortedAndFilteredRows.length.toLocaleString()} rekod
                          </p>
                          
                          <div className="flex items-center gap-1 flex-wrap justify-center">
                            <button 
                              disabled={currentPage === 1}
                              onClick={() => setCurrentPage(1)}
                              className="p-2 bg-white border border-slate-200 rounded-xl disabled:opacity-40 transition font-black text-[10px]"
                            >
                              Mula
                            </button>
                            <button 
                              disabled={currentPage === 1}
                              onClick={() => setCurrentPage(p => Math.max(1, p - 1))}
                              className="p-2 bg-white border border-slate-200 rounded-xl disabled:opacity-40 transition font-black text-[10px]"
                            >
                              Seterusnya
                            </button>
                            <span className="px-3 text-xs font-black text-slate-800">
                              Halaman {currentPage} daripada {totalPages}
                            </span>
                            <button 
                              disabled={currentPage === totalPages}
                              onClick={() => setCurrentPage(p => Math.min(totalPages, p + 1))}
                              className="p-2 bg-white border border-slate-200 rounded-xl disabled:opacity-40 transition font-black text-[10px]"
                            >
                              Seterusnya
                            </button>
                            <button 
                              disabled={currentPage === totalPages}
                              onClick={() => setCurrentPage(totalPages)}
                              className="p-2 bg-white border border-slate-200 rounded-xl disabled:opacity-40 transition font-black text-[10px]"
                            >
                              Akhir
                            </button>
                          </div>
                        </div>
                      </div>
                    </React.Fragment>
                  ) : (
                    <div className="bg-white p-12 text-center border border-slate-100 space-y-6 flex flex-col items-center justify-center rounded-[1.5rem]">
                      <div className="p-4 bg-slate-100 text-slate-400 rounded-full">
                        <IconAlertTriangle />
                      </div>
                      <div className="space-y-1.5">
                        <h3 className="text-base font-black text-slate-900">Tiada Data Tersedia</h3>
                        <p className="text-xs text-slate-400 max-w-md">Sila semak semula sambungan internet anda atau muat naik fail data {activeModule.toUpperCase()} (.xlsx / .csv) secara manual melalui menu di panel sisi.</p>
                      </div>
                    </div>
                  )}
                </React.Fragment>
              )}

            </div>
          </main>

          {/* MODAL CONFIG OVERRIDE (DALAM PORTAL) */}
          {showConfigModal && (
            <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
              <div className="bg-white w-full max-w-lg rounded-2xl shadow-2xl border border-slate-200 overflow-hidden flex flex-col">
                <div className="px-6 py-4 bg-slate-50 border-b border-slate-100 flex justify-between items-center">
                  <h3 className="font-bold text-slate-800 text-base flex items-center space-x-2">
                    <i className="fas fa-cog text-blue-600"></i>
                    <span>Tetapan Konfigurasi Firebase</span>
                  </h3>
                  <button onClick={() => setShowConfigModal(false)} className="text-slate-400 hover:text-slate-600">
                    <i className="fas fa-times"></i>
                  </button>
                </div>
                <div className="p-6 space-y-4 overflow-y-auto max-h-[70vh]">
                  <p className="text-xs text-slate-500 leading-relaxed">
                    Uruskan sambungan pangkalan data anda di bawah. Anda boleh menukar konfigurasi global automatik platform atau meletakkan kredensial projek Firebase anda sendiri secara manual.
                  </p>

                  <div className="space-y-3">
                    <div className="flex items-center space-x-3 p-3 bg-blue-50 rounded-xl border border-blue-100">
                      <input type="radio" id="portal-cfg-auto" name="portal-cfg-src" checked={configSource === 'auto'} onChange={() => setConfigSource('auto')} className="h-4 w-4" />
                      <label htmlFor="portal-cfg-auto" className="flex-1 cursor-pointer">
                        <span className="block text-xs font-bold text-blue-800">Gunakan Konfigurasi Platform (Automatik)</span>
                        <span className="block text-[10px] text-blue-500">Menghubungkan terus ke Firebase bersepadu dalam aplikasi ini.</span>
                      </label>
                    </div>

                    <div className="flex items-center space-x-3 p-3 bg-slate-50 rounded-xl border border-slate-200">
                      <input type="radio" id="portal-cfg-manual" name="portal-cfg-src" checked={configSource === 'manual'} onChange={() => setConfigSource('manual')} className="h-4 w-4" />
                      <label htmlFor="portal-cfg-manual" className="flex-1 cursor-pointer">
                        <span className="block text-xs font-bold text-slate-700">Masukkan Konfigurasi Sendiri (Manual)</span>
                        <span className="block text-[10px] text-slate-400">Sesuai jika anda ingin menyimpan data ke projek Firebase peribadi anda sendiri.</span>
                      </label>
                    </div>
                  </div>

                  {configSource === 'manual' && (
                    <div className="space-y-3 pt-2">
                      <div className="grid grid-cols-2 gap-3">
                        <div>
                          <label className="block text-[10px] font-bold uppercase tracking-wider text-slate-500 mb-1">API Key</label>
                          <input type="text" value={cfgApiKey} onChange={(e) => setCfgApiKey(e.target.value)} className="w-full px-3 py-2 border border-slate-200 rounded-lg text-xs font-mono" placeholder="AIzaSy..." />
                        </div>
                        <div>
                          <label className="block text-[10px] font-bold uppercase tracking-wider text-slate-500 mb-1">Auth Domain</label>
                          <input type="text" value={cfgAuthDomain} onChange={(e) => setCfgAuthDomain(e.target.value)} className="w-full px-3 py-2 border border-slate-200 rounded-lg text-xs font-mono" placeholder="project.firebaseapp.com" />
                        </div>
                      </div>
                      <div className="grid grid-cols-2 gap-3">
                        <div>
                          <label className="block text-[10px] font-bold uppercase tracking-wider text-slate-500 mb-1">Project ID</label>
                          <input type="text" value={cfgProjectId} onChange={(e) => setCfgProjectId(e.target.value)} className="w-full px-3 py-2 border border-slate-200 rounded-lg text-xs font-mono" placeholder="project-id" />
                        </div>
                        <div>
                          <label className="block text-[10px] font-bold uppercase tracking-wider text-slate-500 mb-1">Storage Bucket</label>
                          <input type="text" value={cfgStorageBucket} onChange={(e) => setCfgStorageBucket(e.target.value)} className="w-full px-3 py-2 border border-slate-200 rounded-lg text-xs font-mono" placeholder="project.appspot.com" />
                        </div>
                      </div>
                      <div className="grid grid-cols-2 gap-3">
                        <div>
                          <label className="block text-[10px] font-bold uppercase tracking-wider text-slate-500 mb-1">Messaging Sender ID</label>
                          <input type="text" value={cfgMessagingSenderId} onChange={(e) => setCfgMessagingSenderId(e.target.value)} className="w-full px-3 py-2 border border-slate-200 rounded-lg text-xs font-mono" placeholder="1234567" />
                        </div>
                        <div>
                          <label className="block text-[10px] font-bold uppercase tracking-wider text-slate-500 mb-1">App ID</label>
                          <input type="text" value={cfgAppId} onChange={(e) => setCfgAppId(e.target.value)} className="w-full px-3 py-2 border border-slate-200 rounded-lg text-xs font-mono" placeholder="1:123:web..." />
                        </div>
                      </div>
                    </div>
                  )}
                </div>
                <div className="px-6 py-4 bg-slate-50 border-t border-slate-100 flex justify-end space-x-3">
                  <button onClick={() => setShowConfigModal(false)} className="px-4 py-2 text-xs font-semibold text-slate-500 hover:bg-slate-100 rounded-xl">Batal</button>
                  <button onClick={saveFirebaseConfigOverride} className="px-4 py-2 text-xs font-semibold text-white bg-blue-600 hover:bg-blue-700 rounded-xl shadow-md">Simpan & Muat Semula</button>
                </div>
              </div>
            </div>
          )}

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
