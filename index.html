                      {uasaSubjectAnalysisList.map((sub, idx) => {
                        const isSelected = selectedUasaAnalysisSubject === sub.subjectName;
                        const activeLabel = activeUasaSubjectMetric === 'baikRate' ? 'Kelompok Baik:' : activeUasaSubjectMetric === 'nearMissRate' ? 'Near Miss:' : 'Intervensi:';
                        const activeValue = sub[activeUasaSubjectMetric];
                        const barColor = activeUasaSubjectMetric === 'baikRate' ? 'bg-emerald-500' : activeUasaSubjectMetric === 'nearMissRate' ? 'bg-[#3B257B]' : 'bg-rose-500';

                        return (
                          <div 
                            key={idx}
                            onClick={() => { setSelectedUasaAnalysisSubject(sub.subjectName); setUasaFilters(prev => ({ ...prev, subject: sub.subjectName })); }}
                            className={`p-4 rounded-2xl border transition-all cursor-pointer select-none ${isSelected ? 'bg-[#4F359B] text-white border-[#4F359B] shadow-lg scale-105' : 'bg-white text-slate-800 border-slate-200 hover:shadow-md'}`}
                          >
                            <h5 className="font-extrabold text-xs tracking-tight line-clamp-2 min-h-[2rem]">{sub.subjectName}</h5>
                            <div className="mt-3 space-y-1 text-[10px]">
                              <div className="flex justify-between font-bold"><span>{activeLabel}</span><span>{activeValue}%</span></div>
                              <div className={`h-1.5 w-full rounded-full ${isSelected ? 'bg-white/20' : 'bg-slate-100'}`}>
                                <div className={`h-full rounded-full ${isSelected && activeUasaSubjectMetric === 'nearMissRate' ? 'bg-amber-400' : barColor}`} style={{ width: `${activeValue}%` }}></div>
                              </div>
                              <div className="text-[9px] opacity-75 pt-1">{sub.assessed.toLocaleString()} murid ditaksir</div>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  </div>

                  {/* Detail Drill Down UASA */}
                  {selectedUasaSubjectDetails && (
                    <div className="bg-white p-8 rounded-[2rem] shadow-sm border border-slate-100 space-y-6">
                      <div className="border-b border-slate-100 pb-3 flex justify-between items-center">
                        <div>
                          <h4 className="text-sm font-black text-slate-900 uppercase">Perincian Taburan Gred / TH Bagi Subjek</h4>
                          <p className="text-[10px] text-slate-400 font-semibold">{selectedUasaAnalysisSubject}</p>
                        </div>
                        <span className="text-[10px] bg-purple-50 text-[#4F359B] font-black px-2 py-1 rounded">Jumlah = {selectedUasaSubjectDetails.total.toLocaleString()} murid</span>
                      </div>
                      <div className="space-y-4">
                        {[
                          { label: 'Gred A (Kelompok Baik)', count: selectedUasaSubjectDetails.a, color: 'bg-emerald-500' },
                          { label: 'Gred B (Kelompok Baik)', count: selectedUasaSubjectDetails.b, color: 'bg-emerald-400' },
                          { label: 'Gred C (Kelompok Baik)', count: selectedUasaSubjectDetails.c, color: 'bg-emerald-300' },
                          { label: 'Gred D (Kelompok Near Miss)', count: selectedUasaSubjectDetails.d, color: 'bg-amber-400' },
                          { label: 'Gred E (Kelompok Near Miss)', count: selectedUasaSubjectDetails.e, color: 'bg-amber-300' },
                          { label: 'Gred F (Kelompok Perlu Intervensi)', count: selectedUasaSubjectDetails.f, color: 'bg-rose-500' },
                          { label: 'TH (Tidak Hadir)', count: selectedUasaSubjectDetails.th, color: 'bg-slate-400' }
                        ].map((tp, idx) => {
                          const pct = ((tp.count / (selectedUasaSubjectDetails.total || 1)) * 100).toFixed(1);
                          return (
                            <div key={idx} className="space-y-1">
                              <div className="flex justify-between text-[10px] font-bold"><span className="text-slate-700">{tp.label}</span><span className="text-slate-400">{tp.count.toLocaleString()} rekod ({pct}%)</span></div>
                              <div className="h-2.5 w-full bg-slate-100 rounded-full overflow-hidden"><div className={`h-full ${tp.color}`} style={{ width: `${pct}%` }}></div></div>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  )}

                </div>
              )}

              {/* KAWASAN JADUAL DETAIL (DINAMIK MENGIKUT SISTEM) */}
              {currentSystem === 'pbd' && !isLoadingPBD && rawPBDRows.length > 0 && (
                <div className="bg-white p-8 rounded-[2rem] shadow-sm border border-slate-100 space-y-6">
                  <div className="flex justify-between items-center">
                    <div>
                      <h3 className="text-lg font-black text-slate-900">Senarai Kumpulan Pentaksiran PBD</h3>
                      <p className="text-xs text-slate-400 font-medium">Klik pada pengepala lajur untuk mengisih rekod secara menaik / menurun</p>
                    </div>
                    <span className="text-xs bg-slate-100 text-slate-600 px-3.5 py-1.5 rounded-xl font-bold">
                      {filteredPBDRows.length} Baris Kumpulan Teragregat
                    </span>
                  </div>

                  <div className="overflow-x-auto">
                    <table className="w-full text-left text-xs border-collapse font-sans">
                      <thead>
                        <tr className="bg-slate-50 text-slate-500 text-[10px] uppercase font-black tracking-wider border-b border-slate-100">
                          <th onClick={() => setPbdSortConfig({ key: 'school', direction: pbdSortConfig.direction === 'asc' ? 'desc' : 'asc' })} className="p-4 cursor-pointer hover:bg-slate-100 rounded-tl-xl">Kod & Nama Institusi <SortIcon active={pbdSortConfig.key === 'school'} direction={pbdSortConfig.direction} /></th>
                          <th onClick={() => setPbdSortConfig({ key: 'ppd', direction: pbdSortConfig.direction === 'asc' ? 'desc' : 'asc' })} className="p-4 cursor-pointer hover:bg-slate-100">PPD <SortIcon active={pbdSortConfig.key === 'ppd'} direction={pbdSortConfig.direction} /></th>
                          <th onClick={() => setPbdSortConfig({ key: 'level', direction: pbdSortConfig.direction === 'asc' ? 'desc' : 'asc' })} className="p-4 cursor-pointer hover:bg-slate-100">Tahun / Tingkatan <SortIcon active={pbdSortConfig.key === 'level'} direction={pbdSortConfig.direction} /></th>
                          <th onClick={() => setPbdSortConfig({ key: 'subject', direction: pbdSortConfig.direction === 'asc' ? 'desc' : 'asc' })} className="p-4 cursor-pointer hover:bg-slate-100">Mata Pelajaran <SortIcon active={pbdSortConfig.key === 'subject'} direction={pbdSortConfig.direction} /></th>
                          <th onClick={() => setPbdSortConfig({ key: 'tp12', direction: pbdSortConfig.direction === 'asc' ? 'desc' : 'asc' })} className="p-4 text-center cursor-pointer hover:bg-slate-100">TP1-TP2 <SortIcon active={pbdSortConfig.key === 'tp12'} direction={pbdSortConfig.direction} /></th>
                          <th onClick={() => setPbdSortConfig({ key: 'tp34', direction: pbdSortConfig.direction === 'asc' ? 'desc' : 'asc' })} className="p-4 text-center cursor-pointer hover:bg-slate-100">TP3-TP4 <SortIcon active={pbdSortConfig.key === 'tp34'} direction={pbdSortConfig.direction} /></th>
                          <th onClick={() => setPbdSortConfig({ key: 'tp56', direction: pbdSortConfig.direction === 'asc' ? 'desc' : 'asc' })} className="p-4 text-center cursor-pointer hover:bg-slate-100">TP5-TP6 <SortIcon active={pbdSortConfig.key === 'tp56'} direction={pbdSortConfig.direction} /></th>
                          <th onClick={() => setPbdSortConfig({ key: 'td', direction: pbdSortConfig.direction === 'asc' ? 'desc' : 'asc' })} className="p-4 text-center cursor-pointer hover:bg-slate-100 rounded-tr-xl">TD <SortIcon active={pbdSortConfig.key === 'td'} direction={pbdSortConfig.direction} /></th>
                        </tr>
                      </thead>
                      <tbody className="divide-y divide-slate-100 text-slate-700">
                        {sortedAndFilteredPBDRows.slice(0, 50).map((row, i) => (
                          <tr key={i} className="hover:bg-slate-50 transition-colors">
                            <td className="p-4 font-bold text-slate-800">
                              <span className="text-purple-600 block text-[10px] font-mono">{row.categories.schoolCode}</span>
                              <span className="whitespace-normal break-words block text-xs max-w-[320px]">{row.categories.school}</span>
                            </td>
                            <td className="p-4 font-semibold text-slate-600 uppercase">{row.categories.ppd}</td>
                            <td className="p-4 font-semibold text-slate-600">{row.categories.level}</td>
                            <td className="p-4 font-bold text-slate-800">{row.categories.subject}</td>
                            <td className="p-4 text-center font-bold text-rose-600">{(row.counts.tp1 + row.counts.tp2).toLocaleString()}</td>
                            <td className="p-4 text-center font-bold text-blue-600">{(row.counts.tp3 + row.counts.tp4).toLocaleString()}</td>
                            <td className="p-4 text-center font-bold text-emerald-600">{(row.counts.tp5 + row.counts.tp6).toLocaleString()}</td>
                            <td className="p-4 text-center font-medium text-slate-400">{row.counts.td.toLocaleString()}</td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                  {sortedAndFilteredPBDRows.length > 50 && (
                    <p className="text-[10px] text-slate-400 text-center font-bold">* Menunjukkan 50 baris kumpulan pertama sahaja bagi mengekalkan kestabilan kelajuan rendering portal.</p>
                  )}
                </div>
              )}

              {currentSystem === 'uasa' && !isLoadingUASA && rawUASARows.length > 0 && (
                <div className="bg-white p-8 rounded-[2rem] shadow-sm border border-slate-100 space-y-6">
                  <div className="flex justify-between items-center">
                    <div>
                      <h3 className="text-lg font-black text-slate-900">Senarai Institusi / Kumpulan Pentaksiran UASA</h3>
                      <p className="text-xs text-slate-400 font-medium">Klik pengepala lajur untuk mengisih rekod secara menaik / menurun</p>
                    </div>
                    <span className="text-xs bg-slate-100 text-slate-600 px-3.5 py-1.5 rounded-xl font-bold">
                      {filteredUASARows.length} Baris Kumpulan Teragregat
                    </span>
                  </div>

                  <div className="overflow-x-auto">
                    <table className="w-full text-left text-xs border-collapse font-sans">
                      <thead>
                        <tr className="bg-slate-50 text-slate-500 text-[10px] uppercase font-black tracking-wider border-b border-slate-100">
                          <th onClick={() => setUasaSortConfig({ key: 'school', direction: uasaSortConfig.direction === 'asc' ? 'desc' : 'asc' })} className="p-4 cursor-pointer hover:bg-slate-100 rounded-tl-xl">Kod & Nama Institusi <SortIcon active={uasaSortConfig.key === 'school'} direction={uasaSortConfig.direction} /></th>
                          <th onClick={() => setUasaSortConfig({ key: 'ppd', direction: uasaSortConfig.direction === 'asc' ? 'desc' : 'asc' })} className="p-4 cursor-pointer hover:bg-slate-100">PPD <SortIcon active={uasaSortConfig.key === 'ppd'} direction={uasaSortConfig.direction} /></th>
                          <th onClick={() => setUasaSortConfig({ key: 'level', direction: uasaSortConfig.direction === 'asc' ? 'desc' : 'asc' })} className="p-4 cursor-pointer hover:bg-slate-100">Tahun / Tingkatan <SortIcon active={uasaSortConfig.key === 'level'} direction={uasaSortConfig.direction} /></th>
                          <th onClick={() => setUasaSortConfig({ key: 'subject', direction: uasaSortConfig.direction === 'asc' ? 'desc' : 'asc' })} className="p-4 cursor-pointer hover:bg-slate-100">Mata Pelajaran <SortIcon active={uasaSortConfig.key === 'subject'} direction={uasaSortConfig.direction} /></th>
                          <th onClick={() => setUasaSortConfig({ key: 'baik', direction: uasaSortConfig.direction === 'asc' ? 'desc' : 'asc' })} className="p-4 text-center cursor-pointer hover:bg-slate-100 text-emerald-700 bg-emerald-50/50">Kelompok Baik (A, B, C) <SortIcon active={uasaSortConfig.key === 'baik'} direction={uasaSortConfig.direction} /></th>
                          <th onClick={() => setUasaSortConfig({ key: 'nearMiss', direction: uasaSortConfig.direction === 'asc' ? 'desc' : 'asc' })} className="p-4 text-center cursor-pointer hover:bg-slate-100 text-amber-700 bg-amber-50/50">Kelompok Near Miss (D, E) <SortIcon active={uasaSortConfig.key === 'nearMiss'} direction={uasaSortConfig.direction} /></th>
                          <th onClick={() => setUasaSortConfig({ key: 'intervensi', direction: uasaSortConfig.direction === 'asc' ? 'desc' : 'asc' })} className="p-4 text-center cursor-pointer hover:bg-slate-100 text-rose-700 bg-rose-50/50">Intervensi (F) <SortIcon active={uasaSortConfig.key === 'intervensi'} direction={uasaSortConfig.direction} /></th>
                          <th onClick={() => setUasaSortConfig({ key: 'th', direction: uasaSortConfig.direction === 'asc' ? 'desc' : 'asc' })} className="p-4 text-center cursor-pointer hover:bg-slate-100 rounded-tr-xl">TH <SortIcon active={uasaSortConfig.key === 'th'} direction={uasaSortConfig.direction} /></th>
                        </tr>
                      </thead>
                      <tbody className="divide-y divide-slate-100 text-slate-700">
                        {sortedAndFilteredUASARows.slice(0, 50).map((row, i) => {
                          const baik = row.counts.a + row.counts.b + row.counts.c;
                          const nearMiss = row.counts.d + row.counts.e;
                          const intervensi = row.counts.f;
                          return (
                            <tr key={i} className="hover:bg-slate-50 transition-colors">
                              <td className="p-4 font-bold text-slate-800">
                                <span className="text-purple-600 block text-[10px] font-mono">{row.categories.schoolCode}</span>
                                <span className="whitespace-normal break-words block text-xs max-w-[320px]">{row.categories.school}</span>
                              </td>
                              <td className="p-4 font-semibold text-slate-600 uppercase">{row.categories.ppd}</td>
                              <td className="p-4 font-semibold text-slate-600">{row.categories.level}</td>
                              <td className="p-4 font-bold text-slate-800">{row.categories.subject}</td>
                              <td className="p-4 text-center font-extrabold text-emerald-600 bg-emerald-50/20">{baik.toLocaleString()}</td>
                              <td className="p-4 text-center font-extrabold text-amber-500 bg-amber-50/20">{nearMiss.toLocaleString()}</td>
                              <td className="p-4 text-center font-extrabold text-rose-600 bg-rose-50/20">{intervensi.toLocaleString()}</td>
                              <td className="p-4 text-center font-medium text-slate-400">{row.counts.th.toLocaleString()}</td>
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                  </div>
                  {sortedAndFilteredUASARows.length > 50 && (
                    <p className="text-[10px] text-slate-400 text-center font-bold">* Memaparkan 50 baris kumpulan pertama sahaja bagi memastikan kelancaran rendering portal.</p>
                  )}
                </div>
              )}

            </div>
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
