<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal Dashboard Bersepadu PBD & UASA 2025</title>
  
  <!-- Memuat CDN Tailwind CSS untuk Desain Premium -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Memuat CDN React & ReactDOM versi Produksi -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Memuat CDN Babel Compiler untuk memproses JSX langsung di browser -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Memuat CDN PapaParse untuk Analisis CSV -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

  <!-- Memuat CDN SheetJS untuk membaca file .xlsx secara dinamis -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <!-- Konfigurasi Tema Kustom Tailwind CSS -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              purple: '#4F359B',
              darkPurple: '#3B257B',
              amber: '#F59E0B'
            }
          }
        }
      }
    }
  </script>
  <style>
    /* Menyembunyikan scrollbar bawaan untuk menjaga kerapihan UI */
    .no-scrollbar::-webkit-scrollbar {
        display: none;
    }
    .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
    }
    /* Animasi mikro */
    .hover-scale {
      transition: all 0.2s ease-in-out;
    }
    .hover-scale:hover {
      transform: scale(1.02);
    }
  </style>
</head>
<body class="bg-[#F8FAFC] overflow-hidden font-sans text-slate-800">

  <!-- Root elemen sebagai wadah aplikasi React -->
  <div id="root"></div>

  <!-- Memuat Firebase SDKs secara modular -->
  <script type="text/babel" data-type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, onSnapshot, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    // Inisialisasi Firebase menggunakan konfigurasi projek sebenar anda
    const firebaseConfig = typeof __firebase_config !== 'undefined' 
      ? JSON.parse(__firebase_config) 
      : { 
          apiKey: "AIzaSyBUdjM6ezrsoNcJ5WEMEUqNJIjoUu_yQYk",
          authDomain: "dashboard-pbd-64e15.firebaseapp.com",
          projectId: "dashboard-pbd-64e15",
          storageBucket: "dashboard-pbd-64e15.firebasestorage.app",
          messagingSenderId: "352363531733",
          appId: "1:352363531733:web:8e45e274f6d882458b015c",
          measurementId: "G-RKKGHTFGB6"
        };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

    // ==========================================
    // Ikon-Ikon SVG Kustom untuk Antarmuka Dashboard
    // ==========================================
    const IconUsers = () => (
      <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2">
        <path strokeLinecap="round" strokeLinejoin="round" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z" />
      </svg>
    );

    const IconCheckCircle = () => (
      <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2">
        <path strokeLinecap="round" strokeLinejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
      </svg>
    );

    const IconSparkles = () => (
      <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2">
        <path strokeLinecap="round" strokeLinejoin="round" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z" />
      </svg>
    );

    const IconAlertTriangle = () => (
      <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2">
        <path strokeLinecap="round" strokeLinejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
      </svg>
    );

    const IconBookOpen = () => (
      <svg className="w-4 h-4 text-purple-600 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2">
        <path strokeLinecap="round" strokeLinejoin="round" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
      </svg>
    );

    const IconSchool = () => (
      <svg className="w-4 h-4 text-purple-600 font-bold shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2">
        <path strokeLinecap="round" strokeLinejoin="round" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" />
      </svg>
    );

    const IconMapPin = () => (
      <svg className="w-4 h-4 text-purple-600 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2">
        <path strokeLinecap="round" strokeLinejoin="round" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
        <path strokeLinecap="round" strokeLinejoin="round" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
      </svg>
    );

    const IconLayers = () => (
      <svg className="w-4 h-4 text-purple-600 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2">
        <path strokeLinecap="round" strokeLinejoin="round" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
      </svg>
    );

    const IconSliders = () => (
      <svg className="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2">
        <path strokeLinecap="round" strokeLinejoin="round" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4" />
      </svg>
    );

    const IconMousePointer = () => (
      <svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2">
        <path strokeLinecap="round" strokeLinejoin="round" d="M15.043 15.043L21 21M15.043 15.043L18.5 12M15.043 15.043l-3.043-3.043m0 0L3 3m9 9l3.043 3.043M12 12l3-3m-3 3L9 15" />
      </svg>
    );

    const IconUpload = () => (
      <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2">
        <path strokeLinecap="round" strokeLinejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
      </svg>
    );

    const IconSettings = () => (
      <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2">
        <path strokeLinecap="round" strokeLinejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.343.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
        <path strokeLinecap="round" strokeLinejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
      </svg>
    );

    const SortIcon = ({ active, direction }) => {
      if (!active) {
        return (
          <svg className="w-3 h-3 text-slate-300 ml-1 inline-block transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2.5">
            <path strokeLinecap="round" strokeLinejoin="round" d="M8.25 15L12 18.75 15.75 15m-7.5-6L12 5.25 15.75 9" />
          </svg>
        );
      }
      if (direction === 'asc') {
        return (
          <svg className="w-3 h-3 text-slate-100 ml-1 inline-block" fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="3.5">
            <path strokeLinecap="round" strokeLinejoin="round" d="M4.5 15.75l7.5-7.5 7.5 7.5" />
          </svg>
        );
      }
      return (
        <svg className="w-3 h-3 text-slate-100 ml-1 inline-block" fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="3.5">
          <path strokeLinecap="round" strokeLinejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5" />
        </svg>
      );
    };

    // Lookup label mesra pengguna untuk saringan (Global scope bagi React Babel)
    const filterMetadata = {
      ppd: { label: 'Pejabat Pendidikan Daerah (PPD)', icon: IconSchool },
      school: { label: 'Nama Institusi / Sekolah', icon: IconSchool },
      schoolCode: { label: 'Kod Sekolah', icon: IconLayers },
      schoolType: { label: 'Jenis Sekolah', icon: IconSchool },
      level: { label: 'Tahun / Tingkatan', icon: IconLayers },
      subject: { label: 'Mata Pelajaran (MP)', icon: IconBookOpen },
      location: { label: 'Lokasi Kawasan', icon: IconMapPin },
      dlp: { label: 'Status DLP', icon: IconSparkles }
    };

    // Terjemahan label "ALL" (Semua) mengikut kategori dalam Bahasa Melayu
    const filterAllLabels = {
      ppd: 'SEMUA PPD',
      school: 'SEMUA INSTITUSI',
      schoolCode: 'SEMUA KOD SEKOLAH',
      schoolType: 'SEMUA JENIS SEKOLAH',
      level: 'SEMUA TAHUN / TINGKATAN',
      subject: 'SEMUA MATA PELAJARAN',
      location: 'SEMUA LOKASI',
      dlp: 'SEMUA STATUS DLP'
    };

    // ==========================================
    // Komponen Utama Aplikasi Bersepadu
    // ==========================================
    function App() {
      // Keadaan Log Masuk
      const [isLoggedIn, setIsLoggedIn] = React.useState(false);
      const [userEmail, setUserEmail] = React.useState('');
      const [inputEmail, setInputEmail] = React.useState('');
      const [loginError, setLoginError] = React.useState('');
      
      // Ambil sandaran awal URL daripada localStorage jika ada untuk paparan segera
      const initialScriptUrl = localStorage.getItem('googleScriptUrl') || 'https://script.google.com/macros/s/AKfycbzL5Tz-W0H7i88HqS3zVbIqW5v5Wp9-YOUR-SCRIPT-URL/exec';
      const [googleScriptUrl, setGoogleScriptUrl] = React.useState(initialScriptUrl);
      const [showSettingsModal, setShowSettingsModal] = React.useState(false);
      const [tempScriptUrl, setTempScriptUrl] = React.useState(initialScriptUrl);

      // Sesi Debugging Logs untuk Pengguna
      const [debugLogs, setDebugLogs] = React.useState([]);

      // Firebase Authentication Tracker
      const [firebaseUser, setFirebaseUser] = React.useState(null);

      // Keadaan Navigasi Utama Antara PBD dan UASA
      const [currentSystem, setCurrentSystem] = React.useState('pbd'); // 'pbd' atau 'uasa'
      
      // Tab aktif untuk setiap sistem
      const [pbdTab, setPbdTab] = React.useState('ringkasan'); // 'ringkasan' atau 'subjek'
      const [uasaTab, setUasaTab] = React.useState('ringkasan'); // 'ringkasan' atau 'subjek'

      // Keadaan Loading dan Error
      const [isLoadingPBD, setIsLoadingPBD] = React.useState(true);
      const [isLoadingUASA, setIsLoadingUASA] = React.useState(true);
      const [pbdError, setPbdError] = React.useState(null);
      const [uasaError, setUasaError] = React.useState(null);

      // Data mentah terpisah untuk PBD dan UASA
      const [rawPBDRows, setRawPBDRows] = React.useState([]);
      const [rawUASARows, setRawUASARows] = React.useState([]);

      // Opsi Kategori untuk Saringan PBD & UASA
      const [pbdOptions, setPbdOptions] = React.useState({ ppd: [], school: [], schoolCode: [], schoolType: [], level: [], subject: [], location: [], dlp: [] });
      const [uasaOptions, setUasaOptions] = React.useState({ ppd: [], school: [], schoolCode: [], schoolType: [], level: [], subject: [], location: [], dlp: [] });

      // Keadaan Penapis Terpisah bagi Mengelakkan Percampuran Data
      const [pbdFilters, setPbdFilters] = React.useState({ ppd: 'ALL', school: 'ALL', schoolCode: 'ALL', schoolType: 'ALL', level: 'ALL', subject: 'ALL', location: 'ALL', dlp: 'ALL' });
      const [uasaFilters, setUasaFilters] = React.useState({ ppd: 'ALL', school: 'ALL', schoolCode: 'ALL', schoolType: 'ALL', level: 'ALL', subject: 'ALL', location: 'ALL', dlp: 'ALL' });

      // Konfigurasi Pengisihan Jadual
      const [pbdSortConfig, setPbdSortConfig] = React.useState({ key: 'school', direction: 'asc' });
      const [uasaSortConfig, setUasaSortConfig] = React.useState({ key: 'school', direction: 'asc' });

      // Interaktiviti Grafik (Klik Bar)
      const [clickedPbdBar, setClickedPbdBar] = React.useState(null);
      const [clickedPbdGroupedBar, setClickedPbdGroupedBar] = React.useState(null);
      const [clickedUasaBar, setClickedUasaBar] = React.useState(null);
      const [clickedUasaGroupedBar, setClickedUasaGroupedBar] = React.useState(null);

      // Subjek Analis Dinamik
      const [selectedPbdAnalysisSubject, setSelectedPbdAnalysisSubject] = React.useState('');
      const [selectedUasaAnalysisSubject, setSelectedUasaAnalysisSubject] = React.useState('');

      // Metrik Tab Subjek Terpilih
      const [activePbdSubjectMetric, setActivePbdSubjectMetric] = React.useState('passRate'); // 'passRate', 'critRate', 'excelRate'
      const [activeUasaSubjectMetric, setActiveUasaSubjectMetric] = React.useState('baikRate'); // 'baikRate', 'nearMissRate', 'intervensiRate'

      // GitHub URLs
      const GITHUB_PBD_CSV_URL = "https://raw.githubusercontent.com/mohdnorzaini-ship-it/pbd/refs/heads/main/PBD_KESELURUHAN_2025.csv";
      const GITHUB_UASA_EXCEL_URL = "https://raw.githubusercontent.com/mohdnorzaini-ship-it/pbd/main/UASA_KESELURUHAN_2025.csv.xlsx";

      // Fungsi untuk mencetak log nyahpepijat dalaman
      const logDebug = (msg, type = "info") => {
        const time = new Date().toLocaleTimeString();
        setDebugLogs(prev => [{ time, msg, type }, ...prev].slice(0, 30));
      };

      // -------------------------------------------------------------
      // 1. FIREBASE AUTHENTICATION (RULE 3 - Auth Before Queries)
      // -------------------------------------------------------------
      React.useEffect(() => {
        logDebug("Memulakan pengesahan latar belakang Firebase...", "info");
        const initAuth = async () => {
          try {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
              await signInWithCustomToken(auth, __initial_auth_token);
            } else {
              await signInAnonymously(auth);
            }
            logDebug("Sesi Firebase sedia (Log Masuk Tanpa Nama Berjaya).", "success");
          } catch (err) {
            logDebug("Kegagalan pengesahan Firebase: " + err.message, "error");
            console.error("Ralat pengesahan Firebase:", err);
          }
        };
        initAuth();
        const unsubscribe = onAuthStateChanged(auth, setFirebaseUser);
        return () => unsubscribe();
      }, []);

      // -------------------------------------------------------------
      // 2. FIRESTORE REALTIME SYNC (RULE 1 & RULE 2 - Secure Paths & No Complex Queries)
      // -------------------------------------------------------------
      React.useEffect(() => {
        if (!firebaseUser) return;

        logDebug("Menghubungkan ke perkhidmatan Firestore awan...", "info");
        // Path yang diluluskan ketat: /artifacts/{appId}/public/data/config/settings
        const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'config', 'settings');
        
        const unsubscribe = onSnapshot(docRef, (docSnap) => {
          if (docSnap.exists()) {
            const cloudData = docSnap.data();
            if (cloudData.googleScriptUrl) {
              setGoogleScriptUrl(cloudData.googleScriptUrl);
              localStorage.setItem('googleScriptUrl', cloudData.googleScriptUrl);
              logDebug("Pautan API dikemas kini dari Firestore: " + cloudData.googleScriptUrl.substring(0, 35) + "...", "success");
            }
          } else {
            logDebug("Tiada dokumen tetapan ditemui di Firestore. Menggunakan sandaran tempatan.", "warning");
          }
        }, (err) => {
          logDebug("Gagal mengambil tetapan Firestore: " + err.message, "error");
          console.error("Gagal mendapatkan konfigurasi daripada Firestore:", err);
        });

        return () => unsubscribe();
      }, [firebaseUser]);

      // Fungsi untuk menyimpan perubahan URL ke Firestore & LocalStorage secara kekal
      const handleSaveConfig = async (newUrl) => {
        const cleanUrl = newUrl.trim();
        if (!firebaseUser) {
          logDebug("Firebase Auth belum sedia. Sila tunggu seketika.", "error");
          return;
        }
        try {
          localStorage.setItem('googleScriptUrl', cleanUrl);
          setGoogleScriptUrl(cleanUrl);
          logDebug("Menyimpan konfigurasi URL ke storan awan...", "info");

          // Simpan ke Cloud Firestore untuk berkongsi tetapan dengan pengguna lain
          const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'config', 'settings');
          await setDoc(docRef, { googleScriptUrl: cleanUrl }, { merge: true });
          
          logDebug("Kemas kini URL dikongsi berjaya disimpan ke awan Firestore.", "success");
          setShowSettingsModal(false);
        } catch (err) {
          logDebug("Firestore simpan ralat: " + err.message, "error");
          console.error("Gagal menyimpan konfigurasi ke awan Firestore:", err);
        }
      };

      // Fungsi untuk merekod aktiviti ke Google Sheet DAN Firebase Firestore (Dwi-Simpanan)
      const sendLogToGoogleSheet = async (email, action, system) => {
        logDebug(`Merekod log [${action}] bagi sistem [${system.toUpperCase()}]...`, "info");
        
        // 1. PENYIMPANAN DI FIRESTORE (Real-Time Backup)
        if (firebaseUser) {
          try {
            const logsColl = collection(db, 'artifacts', appId, 'public', 'data', 'user_logs');
            await addDoc(logsColl, {
              email: email,
              action: action,
              system: system.toUpperCase(),
              userAgent: navigator.userAgent,
              timestamp: serverTimestamp()
            });
            logDebug("Log log masuk berjaya diduplikasi ke Firebase Firestore.", "success");
          } catch (fireErr) {
            logDebug("Backup Firestore ralat: " + fireErr.message, "warning");
          }
        }

        // 2. PENYIMPANAN DI GOOGLE HAMPRAN (Sheets)
        if (!googleScriptUrl || googleScriptUrl.includes('YOUR-SCRIPT-URL')) {
          logDebug("Langkau Google Sheets: URL Apps Script masih kosong.", "warning");
          return;
        }

        try {
          const payload = {
            email: email,
            action: action,
            system: system.toUpperCase(),
            userAgent: navigator.userAgent
          };

          // Hantar data menggunakan mod plain/text bagi mengelakkan sekatan preflight CORS pelayar web
          await fetch(googleScriptUrl, {
            method: 'POST',
            mode: 'no-cors', 
            headers: {
              'Content-Type': 'text/plain'
            },
            body: JSON.stringify(payload)
          });
          logDebug("Log berjaya dihantar ke Google Sheets API.", "success");
        } catch (err) {
          logDebug("Gagal menghantar ke Google Sheets: " + err.message, "error");
          console.error("Gagal menghantar rekod log masuk ke Google Sheets:", err);
        }
      };

      // Fungsi untuk menguji ping pautan Google Sheet secara langsung
      const handlePingTest = async () => {
        logDebug("Menghubungi Apps Script API (PING)...", "info");
        if (!googleScriptUrl || googleScriptUrl.includes('YOUR-SCRIPT-URL')) {
          logDebug("Gagal: URL Apps Script belum dimasukkan.", "error");
          return;
        }

        try {
          // Melakukan GET request ke URL Web App Apps Script
          const res = await fetch(googleScriptUrl);
          const data = await res.json();
          if (data && data.status === "active") {
            logDebug("Ujian sambungan berjaya: API bertindak balas dengan baik!", "success");
          } else {
            logDebug("Respons tidak dikenali: " + JSON.stringify(data), "warning");
          }
        } catch (err) {
          logDebug("Ralat ping: Pelayan bertindak balas dengan CORS atau sambungan disekat.", "error");
        }
      };

      // Pengesahan ID DELIMa rasmi (berakhiran @moe-dl.edu.my)
      const handleLogin = (e) => {
        if (e) e.preventDefault();
        setLoginError('');

        const emailTrimmed = inputEmail.trim();
        if (!emailTrimmed) {
          setLoginError('Sila masukkan ID DELIMa anda.');
          return;
        }

        const delimaRegex = /^[a-zA-Z0-9._%+-]+@moe-dl\.edu\.my$/i;
        if (!delimaRegex.test(emailTrimmed)) {
          setLoginError('Akses disekat: Sila gunakan ID DELIMa rasmi (@moe-dl.edu.my) sahaja.');
          return;
        }

        // Kejayaan Log Masuk
        setUserEmail(emailTrimmed);
        setIsLoggedIn(true);

        // Hantar log log masuk ke Google Sheet secara real-time
        sendLogToGoogleSheet(emailTrimmed, "LOG_MASUK", currentSystem);
      };

      const handleLogout = () => {
        sendLogToGoogleSheet(userEmail, "LOG_KELUAR", currentSystem);
        setIsLoggedIn(false);
        setUserEmail('');
        setInputEmail('');
        setLoginError('');
      };

      // Ambil data PBD dari GitHub secara automatik
      const fetchPBDData = React.useCallback(() => {
        setIsLoadingPBD(true);
        setPbdError(null);

        fetch(GITHUB_PBD_CSV_URL)
          .then(response => {
            if (!response.ok) throw new Error("Gagal memuat fail PBD dari GitHub.");
            return response.text();
          })
          .then(csvText => {
            const cleanedText = csvText.replace(/\r/g, "");
            Papa.parse(cleanedText, {
              header: true,
              skipEmptyLines: true,
              complete: function(results) {
                if (results.data.length === 0) throw new Error("Fail PBD kosong.");
                processPBD(results.data);
                setIsLoadingPBD(false);
              },
              error: function(err) {
                setPbdError("Ralat parsing PBD: " + err.message);
                setIsLoadingPBD(false);
              }
            });
          })
          .catch(err => {
            setPbdError(`Ralat automatik PBD: ${err.message}. Sila muat naik manual fail PBD.`);
            setIsLoadingPBD(false);
          });
      }, []);

      // Ambil data UASA dari GitHub secara automatik
      const fetchUASAData = React.useCallback(() => {
        setIsLoadingUASA(true);
        setUasaError(null);

        fetch(GITHUB_UASA_EXCEL_URL)
          .then(response => {
            if (!response.ok) throw new Error("Gagal memuat fail UASA dari GitHub.");
            return response.arrayBuffer();
          })
          .then(arrayBuffer => {
            const data = new Uint8Array(arrayBuffer);
            const workbook = XLSX.read(data, { type: 'array' });
            const firstSheetName = workbook.SheetNames[0];
            const worksheet = workbook.Sheets[firstSheetName];
            const jsonData = XLSX.utils.sheet_to_json(worksheet, { defval: "" });
            
            if (jsonData.length === 0) throw new Error("Fail UASA kosong.");
            processUASA(jsonData);
            setIsLoadingUASA(false);
          })
          .catch(err => {
            setUasaError(`Ralat automatik UASA: ${err.message}. Sila muat naik manual fail UASA.`);
            setIsLoadingUASA(false);
          });
      }, []);

      // Muatkan kedua-dua fail semasa permulaan portal
      React.useEffect(() => {
        fetchPBDData();
        fetchUASAData();
      }, [fetchPBDData, fetchUASAData]);

      // Pemprosesan manual PBD (.csv)
      const handleManualPBDUpload = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        setIsLoadingPBD(true);
        setPbdError(null);

        const reader = new FileReader();
        reader.onload = (evt) => {
          const text = evt.target.result;
          Papa.parse(text, {
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
              try {
                if (results.data.length === 0) throw new Error("Fail kosong.");
                processPBD(results.data);
                setIsLoadingPBD(false);
              } catch (err) {
                setPbdError("Ralat manual PBD: " + err.message);
                setIsLoadingPBD(false);
              }
            }
          });
        };
        reader.readAsText(file);
      };

      // Pemprosesan manual UASA (.xlsx)
      const handleManualUASAUpload = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        setIsLoadingUASA(true);
        setUasaError(null);

        const reader = new FileReader();
        reader.onload = (evt) => {
          try {
            const data = new Uint8Array(evt.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            const firstSheetName = workbook.SheetNames[0];
            const worksheet = workbook.Sheets[firstSheetName];
            const jsonData = XLSX.utils.sheet_to_json(worksheet, { defval: "" });
            
            if (jsonData.length === 0) throw new Error("Fail kosong.");
            processUASA(jsonData);
            setIsLoadingUASA(false);
          } catch (err) {
            setUasaError("Ralat manual UASA: " + err.message);
            setIsLoadingUASA(false);
          }
        };
        reader.readAsArrayBuffer(file);
      };

      const processPBD = (data) => {
        const headers = Object.keys(data[0] || {});
        if (headers.length === 0) return;

        const filterKeys = {
          ppd: headers.find(h => h.toUpperCase() === 'KET_PPD') || 'KET_PPD',
          school: headers.find(h => h.toUpperCase() === 'NAMA_PENUH_INSTITUSI') || 'NAMA_PENUH_INSTITUSI',
          schoolCode: headers.find(h => h.toUpperCase() === 'KOD_INSTITUSI') || 'KOD_INSTITUSI',

          level: headers.find(h => h.toUpperCase() === 'THN_TING') || 'THN_TING',
